<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Rocky Hijab Supabase - v29 Sync Firebase Logic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root { --transition-theme: background .3s ease, color .3s ease, border-color .3s ease; }
    [data-theme="dark"]{
      --bg:#0a0d14; --bg2:#0f1420; --bg3:#141a2a; --surface:rgba(255,255,255,.04); --surface-hover:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08); --border-focus:rgba(99,155,255,.5); --text:#eef2ff; --text-soft:#7a85a0; --text-ghost:#3a4258;
      --accent:#5b8fff; --accent-dim:rgba(91,143,255,.15); --accent-glow:rgba(91,143,255,.25); --green:#52d89e; --green-dim:rgba(82,216,158,.12);
      --red:#ff6b6b; --red-dim:rgba(255,107,107,.12); --amber:#ffc46b; --amber-dim:rgba(255,196,107,.12); --nav-bg:rgba(10,13,20,.92); --shadow:0 8px 32px rgba(0,0,0,.5); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    [data-theme="light"]{
      --bg:#f0f2f8; --bg2:#ffffff; --bg3:#f7f8fc; --surface:rgba(0,0,0,.03); --surface-hover:rgba(0,0,0,.055);
      --border:rgba(0,0,0,.07); --border-focus:rgba(64,120,240,.4); --text:#0f1523; --text-soft:#5c6478; --text-ghost:#aab0c0;
      --accent:#3b6df0; --accent-dim:rgba(59,109,240,.1); --accent-glow:rgba(59,109,240,.2); --green:#18a96b; --green-dim:rgba(24,169,107,.1);
      --red:#e84545; --red-dim:rgba(232,69,69,.1); --amber:#e8960a; --amber-dim:rgba(232,150,10,.1); --nav-bg:rgba(255,255,255,.92); --shadow:0 8px 32px rgba(0,0,0,.1); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--transition-theme);-webkit-font-smoothing:antialiased}
    .stat-value,.stat-mini-num,.amount-display,.trx-amount,.trx-time{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:'tnum' 1,'lnum' 1;}
    #app{max-width:430px;min-height:100vh;margin:0 auto;position:relative;background:var(--bg);overflow-x:hidden}
    [data-theme="dark"] #app::before{content:'';position:fixed;top:-120px;left:-80px;width:320px;height:320px;background:radial-gradient(circle, rgba(91,143,255,.09) 0%, transparent 70%);pointer-events:none;z-index:0}
    #page-content{position:relative;z-index:1;padding-bottom:96px}
    .page-pad{padding:0 18px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;transition:background .15s,var(--transition-theme)}
    .page-title{font-size:24px;font-weight:800;letter-spacing:-.025em}
    .page-subtitle{font-size:12.5px;color:var(--text-soft);margin-top:2px}
    .label-xs{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:10px}
    .g-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;min-height:44px;line-height:1.45;font-size:14px;color:var(--text);outline:none;transition:border-color .18s,background .18s,var(--transition-theme)}
    .g-input:focus{border-color:var(--border-focus);background:var(--accent-dim)}
    .g-input::placeholder{color:var(--text-ghost)}
    .btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .14s ease;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
    .btn:active{transform:scale(.97);opacity:.9}
    .btn:disabled{opacity:.45;pointer-events:none}
    .btn-primary{background:var(--accent);color:white;border-radius:12px;box-shadow:0 4px 18px var(--accent-glow)}
    .btn-glass{background:var(--surface);border:1px solid var(--border)!important;border-radius:12px;color:var(--text-soft)}
    .btn-danger{background:var(--red-dim);border:1px solid rgba(255,107,107,.2)!important;color:var(--red);border-radius:10px}
    .btn-success{background:linear-gradient(135deg, #16a34a, #15803d);color:white;border-radius:12px}
    .theme-toggle{width:38px;height:38px;background:var(--surface);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-soft);flex-shrink:0}
    .theme-btn{color:var(--amber);background:var(--amber-dim);border-color:rgba(255,196,107,.22)}
    .logout-btn{color:var(--red);background:var(--red-dim);border-color:rgba(255,107,107,.22)}
    .header-actions{display:flex;gap:8px;align-items:center}
    .stat-hero{background:linear-gradient(140deg, var(--bg3) 0%, var(--bg2) 100%);border:1px solid var(--border);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .stat-hero{background:linear-gradient(140deg,#131d36 0%, #0d1526 100%);border-color:rgba(91,143,255,.15)}
    .stat-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);pointer-events:none}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .stat-value{font-family:var(--num-font);font-size:28px;font-weight:700;letter-spacing:-.03em;position:relative;z-index:1}
    .stat-sub{font-size:11.5px;color:var(--text-soft);margin-top:5px;position:relative;z-index:1}
    .stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:center}
    .stat-mini-num{font-family:var(--num-font);font-size:26px;font-weight:700;line-height:1.1}
    .stat-mini-lbl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:5px}
    .bonus-card{border:1px solid rgba(255,196,107,.18);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .bonus-card{background:#1a1800}[data-theme="light"] .bonus-card{background:#fffaf0}
    .bonus-card::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle, rgba(255,196,107,.18) 0%, transparent 70%)}
    .modal-wrap{position:fixed;inset:0;background:rgba(5,8,16,.72);backdrop-filter:blur(14px);z-index:150;display:none;align-items:center;justify-content:center;padding:18px}
    .modal-wrap.show{display:flex}
    .modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:392px;padding:16px 16px 18px;box-shadow:var(--shadow);animation:sheetPop .18s ease both}
    .modal-pill{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 14px}
    .amount-display{font-family:var(--num-font);font-size:34px;font-weight:700;color:var(--accent);text-align:right;width:100%;background:none;border:none;outline:none}
    #bottom-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--nav-bg);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:22px;display:flex;justify-content:space-around;align-items:center;height:62px;z-index:100;padding:0 6px;box-shadow:var(--shadow)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border-radius:14px;cursor:pointer;background:none;border:none;color:var(--text-ghost);min-width:52px}
    .nav-item i{font-size:17px}.nav-item span{font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .nav-item.active{background:var(--accent-dim);color:var(--accent)}
    #bottom-nav.staff-nav{justify-content:center;gap:16px;padding:0 12px}
    #bottom-nav.staff-nav .nav-item{flex:1;max-width:124px}
    .swipe-hint{display:flex;align-items:center;justify-content:center;gap:7px;margin:8px 0 0;font-size:10.5px;color:var(--text-ghost);font-weight:700}
    .fab-add{position:fixed;right:22px;bottom:86px;width:58px;height:58px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--accent),#7aa5ff);color:white;display:none;align-items:center;justify-content:center;box-shadow:0 14px 32px var(--accent-glow);z-index:110;cursor:pointer;font-size:22px;transition:transform .16s ease, box-shadow .16s ease}.fab-add:active{transform:scale(.92) rotate(8deg)}.fab-add.staff-fab{bottom:100px;right:20px;width:62px;height:62px;border-radius:22px}
    #loading{position:fixed;inset:0;background:rgba(10,13,20,.7);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
    .loader-ring{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes sheetPop{from{opacity:.85;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-8px) scale(.95);z-index:300;padding:10px 18px;border-radius:100px;font-size:12.5px;font-weight:600;opacity:0;transition:all .22s cubic-bezier(.34,1.5,.64,1);white-space:nowrap;max-width:calc(100% - 40px);text-align:center;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
    .loc-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;font-size:11.5px;font-weight:600}
    .loc-in{background:var(--green-dim);color:var(--green);border:1px solid rgba(82,216,158,.2)}
    .loc-out{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .loc-loading{background:var(--surface);color:var(--text-ghost);border:1px solid var(--border)}
    .tab-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px;display:flex;gap:2px}
    .tab-btn{flex:1;padding:8px 4px;border-radius:9px;font-size:11px;font-weight:600;color:var(--text-ghost);background:none;border:none;cursor:pointer}
    .tab-btn.active{background:var(--accent);color:white}
    .trx-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px}
    .trx-icon{width:38px;height:38px;background:var(--accent-dim);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--accent)}
    .trx-amount{font-family:var(--num-font);font-size:16px;font-weight:600}
    .trx-note{font-size:11.5px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
    .trx-time{font-family:var(--num-font);font-size:9px;color:var(--text-ghost);margin-top:3px}
    .setting-row{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
    .setting-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .setting-label{font-size:13px;font-weight:500;color:var(--text);flex:1;text-align:left}
    .setting-arrow{color:var(--text-ghost);font-size:10px}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .badge-blue{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(91,143,255,.2)}
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid}
    .status-ok{background:var(--green-dim);color:var(--green);border-color:rgba(82,216,158,.2)}
    .status-warn{background:var(--red-dim);color:var(--red);border-color:rgba(255,107,107,.2)}
    .login-brand{width:78px;height:78px;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;position:relative}
    [data-theme="dark"] .login-brand{background:linear-gradient(135deg,#1a2a50 0%,#0d1830 100%);border:1px solid rgba(212,175,55,.25)}
    [data-theme="light"] .login-brand{background:linear-gradient(135deg,#dde8ff 0%,#c5d8ff 100%);border:1px solid rgba(59,109,240,.2)}
    .sync-btn{padding:7px 12px;background:var(--accent-dim);border:1px solid rgba(91,143,255,.2);border-radius:10px;color:var(--accent);font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
    .user-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text-soft)}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .page-in{animation:pageIn .22s ease both}.s1{animation-delay:.04s}.s2{animation-delay:.08s}.s3{animation-delay:.12s}.s4{animation-delay:.16s}
    @keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* === ADMIN COMPACT FULL 1 LAYAR === */
    .page-pad .card{border-radius:14px}
    @media(max-width:430px){
      .page-title{font-size:19px}
      .stat-hero{padding:16px 15px}
      .stat-value{font-size:23px}
      .stat-mini{padding:11px 9px}
      .stat-mini-num{font-size:21px}
    }

    /* === SUPABASE v30 COMPACT CLEAN OVERRIDE === */
    :root{--transition-theme:background .12s ease,color .12s ease,border-color .12s ease}
    body{font-size:12px}#page-content{padding-bottom:78px}.page-pad{padding:0 12px}.card{border-radius:12px}.page-title{font-size:19px;line-height:1.08}.page-subtitle{font-size:10.5px;margin-top:1px}.label-xs{font-size:8.5px;margin-bottom:5px;letter-spacing:.06em}.g-input{border-radius:10px;padding:9px 11px;min-height:36px;font-size:12px;line-height:1.25}.btn{font-size:12px;gap:5px}.theme-toggle{width:32px;height:32px;border-radius:9px;font-size:12px}.header-actions{gap:6px}.stat-hero{border-radius:13px;padding:13px 14px;margin-bottom:8px}.stat-label{font-size:8.5px;margin-bottom:3px}.stat-value{font-size:22px;line-height:1.06}.stat-sub{font-size:10px;margin-top:3px}.stat-mini{border-radius:11px;padding:10px 8px}.stat-mini-num{font-size:20px}.stat-mini-lbl{font-size:8px;margin-bottom:3px}.summary-grid{gap:7px;margin-bottom:7px}.modal-wrap{align-items:flex-end}.modal-sheet{border-radius:18px 18px 0 0;max-width:430px;padding:14px 14px 24px}.modal-ico{width:38px;height:38px;border-radius:11px;font-size:14px;margin-bottom:8px}.amount-display{font-size:27px}#bottom-nav{bottom:8px;width:calc(100% - 18px);max-width:412px;height:52px;border-radius:16px;padding:0 4px}.nav-item{gap:2px;padding:6px 9px;border-radius:11px;min-width:45px}.nav-item i{font-size:14px}.nav-item span{font-size:7.5px}.fab-add{right:15px;bottom:68px;width:50px;height:50px;border-radius:15px;font-size:19px}.trx-card{border-radius:11px;padding:9px 10px;gap:9px}.trx-icon{width:31px;height:31px;border-radius:9px;font-size:12px}.trx-amount{font-size:13px}.trx-note{font-size:10px;max-width:180px}.trx-time{font-size:8.5px}.setting-row{gap:10px;padding:10px 12px;border-radius:11px}.setting-ico{width:29px;height:29px;border-radius:8px;font-size:11px}.setting-label{font-size:12px}.setting-arrow{font-size:9px}.badge{font-size:8px;padding:2px 6px}.status-pill{font-size:9.5px;padding:4px 8px;gap:4px}.login-brand{width:60px;height:60px;border-radius:18px;margin-bottom:14px}.user-chip{gap:4px;padding:3px 7px;font-size:9.5px}.loc-chip{gap:4px;padding:4px 8px;font-size:9.5px}.tab-group{border-radius:10px;padding:2px}.tab-btn{padding:7px 3px;border-radius:8px;font-size:10px}.page-in{animation:none}
    div[style*="padding:34px 0 18px"]{padding:18px 0 10px!important}div[style*="padding:50px 0 18px"]{padding:22px 0 10px!important}div[style*="padding:18px 0 14px"]{padding:14px 0 9px!important}div[style*="margin-bottom:24px"]{margin-bottom:12px!important}div[style*="margin-bottom:18px"],div[style*="margin-bottom:16px"],div[style*="margin-bottom:14px"],div[style*="margin-bottom:12px"],div[style*="margin-bottom:10px"]{margin-bottom:8px!important}div[style*="gap:10px"],div[style*="gap:9px"],div[style*="gap:8px"]{gap:7px!important}div[style*="padding:22px 20px"],div[style*="padding:20px"],div[style*="padding:18px 20px"],div[style*="padding:18px 18px"],div[style*="padding:16px 18px"],div[style*="padding:16px 16px"]{padding:11px 12px!important}div[style*="padding:14px 16px"],div[style*="padding:14px 15px"],div[style*="padding:13px 15px"],div[style*="padding:12px 14px"]{padding:10px 11px!important}button[style*="padding:13px"],button[style*="padding:12px"],button[style*="padding:11px"]{padding:9px 10px!important}button[style*="padding:9px"]{padding:7px 9px!important}p[style*="font-size:34px"]{font-size:27px!important}p[style*="font-size:28px"]{font-size:22px!important}p[style*="font-size:26px"]{font-size:21px!important}p[style*="font-size:24px"]{font-size:19px!important}p[style*="font-size:22px"]{font-size:18px!important}p[style*="font-size:20px"]{font-size:17px!important}p[style*="font-size:17px"]{font-size:14px!important}h1[style],h2[style],h3[style]{line-height:1.08!important}h1[style*="font-size:24px"]{font-size:21px!important}h2[style*="font-size:22px"]{font-size:19px!important}h3[style*="font-size:16px"]{font-size:14px!important}@media(max-width:380px){.page-pad{padding:0 10px}.stat-value{font-size:20px}.trx-note{max-width:140px}.nav-item{padding-left:7px;padding-right:7px}.nav-item span{font-size:7px}}

<body>
<div id="app">
  <div id="loading">
    <div class="loader-ring"></div>
    <p style="font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.07em">MEMPROSES</p>
  </div>
  <div id="toast">Toast</div>

  <div id="transaction-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px">
        <div>
          <h3 style="font-size:16px;font-weight:800;letter-spacing:-.02em">Transaksi Baru</h3>
        </div>
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Catatan</p>
          <input id="modal-pos-note" type="text" placeholder="Tulis manual..." autocomplete="off" class="g-input" style="background:none;border:none;padding:4px 0 2px;font-size:15px;line-height:1.45;min-height:30px;display:block">
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Nominal</p>
          <input id="modal-pos-amount" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" autocomplete="off" class="amount-display" data-numeric="0">
        </div>
      </div>
      <div id="modal-pos-status" style="margin:14px 0 0"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="flex:1;padding:12px;font-size:13px">Batal</button>
        <button onclick="handleTransactionFromModal()" class="btn btn-primary" style="flex:1;padding:12px;font-size:13px">Simpan</button>
      </div>
    </div>
  </div>

  <div id="page-content"></div>

  <nav id="bottom-nav" style="display:none">
    <button onclick="router.navigate('home')" id="nav-home" class="nav-item"><i class="fas fa-house"></i><span id="nav-home-label">Beranda</span></button>
    <button onclick="router.navigate('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt"></i><span id="nav-history-label">Riwayat</span></button>
    <button onclick="router.navigate('report')" id="nav-report" class="nav-item"><i class="fas fa-chart-line"></i><span id="nav-report-label">Laporan</span></button>
    <button onclick="router.navigate('settings')" id="nav-settings" class="nav-item"><i class="fas fa-gear"></i><span id="nav-settings-label">Setelan</span></button>
  </nav>

  <button id="fab-pos" class="fab-add" onclick="openTransactionModal()" aria-label="Tambah transaksi">
    <i class="fas fa-plus"></i>
  </button>

  function extractDateKey(item) {

    if (typeof item.createdAt === 'string' && item.createdAt.length >= 10) return item.createdAt.slice(0, 10);

  function getRecordTimeMs(item) {

    if (item.createdAt?.toDate) return item.createdAt.toDate().getTime();

    if (typeof item.time === 'string') {

  function getMonthlyAttendancePerformance(username) {
    const month = toMonthKey(nowDate());
    const me = sanitizeUsername(username || '');
    const monthlyAtt = getVisibleAttendance().filter(a =>
      String(extractDateKey(a) || '').startsWith(month) &&
      sanitizeUsername(a.user) === me
    );
    if (!monthlyAtt.length) return null;
    // Hitung rata-rata jam absen (dalam menit dari tengah malam WIB)
    let totalMinutes = 0;
    let validCount = 0;
    for (const rec of monthlyAtt) {
      const ms = getRecordTimeMs(rec);
      if (!ms) continue;
      const wib = getWIBDate(new Date(ms));
      totalMinutes += wib.hour * 60 + wib.minute;
      validCount++;
    }
    if (!validCount) return null;
    const avgMinutes = totalMinutes / validCount;
    const avgHour = Math.floor(avgMinutes / 60);
    const avgMin = Math.floor(avgMinutes % 60);
    const avgLabel = `${String(avgHour).padStart(2,'0')}:${String(avgMin).padStart(2,'0')}`;
    // Batas: 07:20 = 420 menit. Lewat 07:20 (> 420) = perlu ditingkatkan
    const isGood = avgMinutes <= 420;
    return { avgLabel, isGood, count: validCount };
  }

  function bindRealtimeData() {
    if (!currentUser) return;
    attendanceReady = false;
    preloadAttendanceCache();
    if (unsubTransactions) unsubTransactions();
    if (unsubAttendance) unsubAttendance();
    if (unsubUsers) { unsubUsers(); unsubUsers = null; }
    if (unsubAuditLogs) { unsubAuditLogs(); unsubAuditLogs = null; }
    if (unsubClosings) { unsubClosings(); unsubClosings = null; }
    if (unsubBonusSettings) { unsubBonusSettings(); unsubBonusSettings = null; }

    // Jangan pakai orderBy('createdAt') di query staff karena data lama/migrasi
    // bisa belum konsisten field createdAt-nya. Itu bikin transaksi staff kadang
    // kosong setelah clear cache/data, padahal admin masih bisa lihat.
    const tq = isAdmin()
      ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
    unsubTransactions = onSnapshot(tq, (snap) => {
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      refreshCurrentPage();
    }, async (err) => {
      console.error(err);
      try {
        const fallbackQ = isAdmin()
          ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
          : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
        const fallbackSnap = await getDocs(fallbackQ);
        cachedTransactions = sortByCreatedDesc(
          fallbackSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        );
        refreshCurrentPage();
      } catch (e) {
        console.error('Fallback transaksi gagal:', e);
      }
    });

    const aq = isAdmin()
      ? query(collection(db, 'attendance'), limit(ATT_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'attendance'), where('user', '==', sanitizeUsername(currentUser.username)), limit(ATT_SYNC_LIMIT_STAFF));
    unsubAttendance = onSnapshot(aq, (snap) => {
      stripCachedAttendance();
      cachedAttendance = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => !isRecordDeleted(a))
      );
      if (!isAdmin()) {
        const today = toDateKey(nowDate());
        const todayRec = cachedAttendance.find(a => extractDateKey(a) === today && sanitizeUsername(a.user) === currentUser.username);
        if (todayRec) {
          const createdAtMs = getRecordTimeMs(todayRec) || Date.now();
          saveAttendanceCache(currentUser.username, { dateKey: today, createdAtMs });
        } else {
          clearAttendanceCache(currentUser.username);
        }
      }
      attendanceReady = true;
      refreshCurrentPage();
    }, (err) => { attendanceReady = true; console.error(err); refreshCurrentPage(); });

    const cq = query(collection(db, 'closings'), limit(CLOSING_SYNC_LIMIT));
    unsubClosings = onSnapshot(cq, (snap) => {
      cachedClosings = sortByCreatedDesc(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      refreshCurrentPage();
    }, (err) => console.error('Closing listener gagal:', err));

    unsubBonusSettings = onSnapshot(doc(db, 'closings', '__bonus_settings'), (snap) => {
      if (snap.exists()) {
        const data = snap.data() || {};
        cachedBonusSettings = {
          transactionBonusRate: Number.isFinite(Number(data.transactionBonusRate)) ? Number(data.transactionBonusRate) : DEFAULT_TRANSACTION_BONUS_RATE,
          closingBonusPerMinute: Number.isFinite(Number(data.closingBonusPerMinute)) ? Number(data.closingBonusPerMinute) : DEFAULT_CLOSING_BONUS_PER_MINUTE,
          updatedAtMs: Number(data.updatedAtMs || 0),
          updatedBy: data.updatedBy || '',
          updatedByName: data.updatedByName || ''
        };
      } else {
        cachedBonusSettings = { transactionBonusRate: DEFAULT_TRANSACTION_BONUS_RATE, closingBonusPerMinute: DEFAULT_CLOSING_BONUS_PER_MINUTE };
      }
      refreshCurrentPage();
    }, (err) => console.error('Bonus settings listener gagal:', err));

    if (isAdmin()) {
      const uq = query(collection(db, 'users'), orderBy('name'));
      unsubUsers = onSnapshot(uq, (snap) => {
        cachedUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        refreshCurrentPage();
      }, (err) => console.error(err));

      const lq = query(collection(db, 'audit_logs'), orderBy('createdAt', 'desc'), limit(AUDIT_SYNC_LIMIT));
      unsubAuditLogs = onSnapshot(lq, (snap) => {
        cachedAuditLogs = sortByCreatedDesc(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        refreshCurrentPage();
      }, (err) => console.error(err));
    } else {
      cachedUsers = currentUser ? [{ username: currentUser.username, name: currentUser.name, role: currentUser.role || 'staff', dailyBonusRate: Number(currentUser.dailyBonusRate || 0), dailyBonusPercent: Number(currentUser.dailyBonusPercent || 0), active: true }] : [];
      cachedAuditLogs = [];
    }

    applyNavRoleLabels();
  }

  function updateLocation() {
    const info = $('loc-info'); if (!info) return;
    info.innerHTML = `<span class="loc-chip loc-loading"><i class="fas fa-circle-notch fa-spin" style="font-size:10px"></i> Mencari GPS...</span>`;
    if (!navigator.geolocation) {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> GPS tidak didukung</span>`; return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const dist = calculateDistance(currentPos.lat, currentPos.lng, OFFICE_LOC.lat, OFFICE_LOC.lng);
      info.innerHTML = dist <= RADIUS_LIMIT
        ? `<span class="loc-chip loc-in"><i class="fas fa-circle" style="font-size:6px"></i> Dalam Radius · ${Math.round(dist)}m</span>`
        : `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> Diluar Radius · ${Math.round(dist)}m</span>`;
      updateHomeStatus();
    }, () => {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-triangle-exclamation"></i> Gagal ambil lokasi</span>`;
    }, { enableHighAccuracy:true, timeout:10000, maximumAge:30000 });
  }

  function bindTransactionAmountFormatter(inputId) {
    const input = $(inputId);
    if (!input || input.dataset.bound === 'true') return;
    input.dataset.bound = 'true';
    input.addEventListener('input', function () {
      const numeric = (this.value || '').replace(/\D/g, '');
      const value = parseInt(numeric || '0', 10);
      this.setAttribute('data-numeric', String(value));
      this.value = numeric ? formatRupiah(value) : '';
    });
  }

  async function handleTransactionFromModal() {

        name: currentUser.name,

      });

  async function deleteTransaction(id) {
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const trx = cachedTransactions.find(t => t.id === id);
    if (!trx) return showToast('Transaksi tidak ditemukan!', true);
    if (trx.user !== currentUser.username && !isAdmin()) return showToast('Tidak bisa hapus transaksi orang lain!', true);
    const pin = prompt(`Hapus transaksi Rp ${formatRupiah(trx.amount)}?\nMasukkan PIN:`);
    if (!pin) return;
    if (String(pin) !== String(currentUser.pin)) return showToast('PIN salah!', true);
    setLoading(true);
    try {
      await setDoc(doc(db, 'transactions', id), {
        deleted: true,
        deletedAt: serverTimestamp(),
        deletedAtMs: Date.now(),
        deletedBy: currentUser.username,
        deletedByName: currentUser.name
      }, { merge: true });
      await logAudit('transaction_soft_delete', { id, user: trx.user, amount: Number(trx.amount || 0), note: trx.note || 'Transaksi' });
      showToast(`✓ Transaksi dihapus aman`);
    } catch (e) {
      console.error(e);
      showToast('Gagal hapus', true);
    }
    setLoading(false);
  }

  function getClosingHistoryRows(limitRows = 14) {
    return [...(cachedClosings || [])]
      .filter(c => c && (c.dateKey || c.id) && c.type !== 'bonus_settings' && c.id !== '__bonus_settings' && c.dateKey !== '__bonus_settings')
      .sort((a, b) => String(b.dateKey || b.id || '').localeCompare(String(a.dateKey || a.id || '')))
      .slice(0, limitRows);
  }
  function formatClosingHistoryTime(closing) {
    const jam = getClosingDisplayTime(closing);
    if (jam) return jam;
    const ms = Number(closing?.closedAtMs || closing?.editedAtMs || 0);
    if (ms) return new Date(ms).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta' }).replace('.', ':');
    return '--:--';
  }
  function formatClosingCancelTime(closing) {
    const ms = Number(closing?.canceledAtMs || 0);
    if (!ms) return '';
    return new Date(ms).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta' }).replace('.', ':');
  }

  function getFilteredTransactions() {
    const visible = getVisibleTransactions();
    const source = isAdmin() && selectedUserFilter !== 'all' ? visible.filter(t => t.user === selectedUserFilter) : visible;
    const today = toDateKey(nowDate());
    const month = toMonthKey(nowDate());
    const year = getBusinessYear(nowDate());
    if (historyFilter === 'daily') return source.filter(t => getTransactionDateKey(t) === today);
    if (historyFilter === 'monthly') return source.filter(t => getTransactionMonthKey(t) === month);
    if (historyFilter === 'yearly') return source.filter(t => String(getTransactionDateKey(t) || '').startsWith(year));
    if (historyFilter === 'range' && rangeStartDate && rangeEndDate) return source.filter(t => { const dateKey = getTransactionDateKey(t); return dateKey >= rangeStartDate && dateKey <= rangeEndDate; });
    return source;
  }

  function serializeTimestamp(value) {
    if (!value) return null;
    if (value.toDate) return value.toDate().toISOString();
    if (typeof value === 'string') return value;
    return null;
  }

  function getBackupPayload() {
    return {
      version: 'firebase-admin-v8',
      projectId: firebaseConfig.projectId,
      exportedAt: new Date().toISOString(),
      exportedBy: currentUser?.username || 'admin',
      data: {
        users: sortUsers(cachedUsers).map(u => ({
          username: u.username, name: u.name, pin: String(u.pin || ''), role: String(u.role || 'staff'), dailyBonusRate: Number(u.dailyBonusRate || 0), dailyBonusPercent: Number(u.dailyBonusPercent || 0),
          active: u.active !== false, createdAt: serializeTimestamp(u.createdAt) || null
        })),
        attendance: sortByCreatedDesc(getVisibleAttendance()).map(a => ({
          user: a.user, name: a.name, dateKey: a.dateKey || extractDateKey(a),
          lat: a.lat ?? a.loc?.lat ?? null, lng: a.lng ?? a.loc?.lng ?? null,
          createdAt: serializeTimestamp(a.createdAt) || null,

        })),

        }))
      }
    };
  }

  function downloadTextFile(content, filename, mimeType = 'text/plain;charset=utf-8') {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function csvEscape(value) {
    const s = String(value ?? '');
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  function toCsv(rows, headers) {
    const lines = [headers.join(',')];
    for (const row of rows) lines.push(headers.map(h => csvEscape(row[h])).join(','));
    return lines.join('\n');
  }

  function parseCsv(text) {
    const rows = [];
    let row = [], value = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { value += '"'; i++; }
        else if (c === '"') inQuotes = false;
        else value += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(value); value = ''; }
        else if (c === '\n') { row.push(value); rows.push(row); row = []; value = ''; }
        else if (c === '\r') { }
        else value += c;
      }
    }
    if (value.length || row.length) { row.push(value); rows.push(row); }
    if (!rows.length) return [];
    const headers = rows[0].map(x => String(x || '').trim());
    return rows.slice(1).filter(r => r.some(cell => String(cell || '').trim() !== '')).map(r => {
      const obj = {};
      headers.forEach((h, idx) => obj[h] = r[idx] ?? '');
      return obj;
    });
  }

  function normalizeBackupShape(raw) {
    if (!raw) throw new Error('Backup kosong');
    if (raw.data && typeof raw.data === 'object') return raw;
    return {
      version: raw.version || 'legacy-import',
      exportedAt: raw.exportedAt || new Date().toISOString(),
      data: {
        users: Array.isArray(raw.users) ? raw.users : [],
        attendance: Array.isArray(raw.attendance) ? raw.attendance : [],
        transactions: Array.isArray(raw.transactions) ? raw.transactions : []
      }
    };
  }


  function getRestoreProFileKind(file) {
    if (!file) return '';
    const name = String(file.name || '').toLowerCase();
    if (name.endsWith('.json') || file.type === 'application/json') return 'json';
    if (name.endsWith('.xlsx') || name.endsWith('.xls') || String(file.type || '').includes('spreadsheet') || String(file.type || '').includes('excel')) return 'excel';
    return '';
  }

              dateKey: String(a.dateKey || a.date || a.tanggal || a.Date || '').slice(0, 10),
              lat: (a.lat ?? a.latitude ?? '') === '' ? null : Number(a.lat ?? a.latitude),
              lng: (a.lng ?? a.longitude ?? '') === '' ? null : Number(a.lng ?? a.longitude),
              createdAt: a.createdAt || a.time || a.waktu || null,

            })).filter(a => a.user),

              monthKey: String(t.monthKey || '').slice(0, 7),

            })).filter(t => t.user)

      showToast(`✓ Restore ${kind.toUpperCase()} selesai: ${result.users.length} user, ${result.attendance.length} absen, ${result.transactions.length} transaksi`);

        }));

          lng: a.lng ?? '',

        }));

  function makeRestoreDocId(prefix, source, idx) {
    const rawId = String(source?.id || source?.docId || source?.uid || '').trim();
    if (rawId && rawId !== 'undefined' && rawId !== 'null') return rawId;
    const ms = Number(source?.createdAtMs || (source?.createdAt ? new Date(source.createdAt).getTime() : Date.now()));
    const safeMs = Number.isFinite(ms) && ms > 0 ? ms : Date.now();
    const user = sanitizeUsername(source?.user || source?.username || 'data') || 'data';
    return prefix + '_' + user + '_' + safeMs + '_' + idx + '_' + Math.random().toString(36).slice(2,8);
  }

  function normalizeRestoreDateKey(item, ms) {
    const direct = String(item?.dateKey || item?.date_key || item?.date || item?.tanggal || '').trim().slice(0, 10);
    if (/^\d{4}-\d{2}-\d{2}$/.test(direct)) return direct;
    if (Number.isFinite(ms) && ms > 0) return toDateKey(new Date(ms));
    return toDateKey(nowDate());
  }

  function normalizeRestoreMonthKey(item, dateKey) {
    const direct = String(item?.monthKey || item?.month_key || '').trim().slice(0, 7);
    if (/^\d{4}-\d{2}$/.test(direct)) return direct;
    return String(dateKey || '').slice(0, 7) || toMonthKey(nowDate());
  }

  async function safeRestoreInsert(table, fallbackId, payload) {
    try {
      return await addDoc(collection(db, table), payload);
    } catch (insertErr) {
      console.warn('Restore insert fallback:', table, insertErr?.message || insertErr);
      return await setDoc(doc(db, table, fallbackId), { ...payload, id: fallbackId }, { merge: true });
    }
  }

  async function importBackupData(backup) {
    const users = Array.isArray(backup?.data?.users) ? backup.data.users : [];
    const attendance = Array.isArray(backup?.data?.attendance) ? backup.data.attendance : [];
    const transactions = Array.isArray(backup?.data?.transactions) ? backup.data.transactions : [];
    let userCount = 0, attCount = 0, txCount = 0;

    for (const u of users) {
      const username = sanitizeUsername(u.username || u.user);
      if (!username) continue;
      await setDoc(doc(db, 'users', username), {
        username,
        name: String(u.name || u.nama || username),
        pin: String(u.pin || u.PIN || ''),
        role: String(u.role || 'staff').toLowerCase(),
        dailyBonusRate: Number(u.dailyBonusRate || 0) || (Number(u.dailyBonusPercent || 0) / 100),
        dailyBonusPercent: Number(u.dailyBonusPercent || 0) || (Number(u.dailyBonusRate || 0) * 100),
        active: u.active !== false && String(u.active ?? 'true') !== 'false',
        deleted: false,
        updatedAt: serverTimestamp(),
        updatedBy: currentUser?.username || 'restore',
        createdAt: u.createdAt || u.created_at || serverTimestamp()
      }, { merge: true });
      userCount++;
    }

    for (let i = 0; i < attendance.length; i++) {
      const a = attendance[i] || {};
      const user = sanitizeUsername(a.user || a.username);
      if (!user) continue;
      const rawMs = Number(a.createdAtMs || a.created_at_ms || (a.createdAt || a.created_at || a.time || a.waktu ? new Date(a.createdAt || a.created_at || a.time || a.waktu).getTime() : Date.now()));
      const ms = Number.isFinite(rawMs) && rawMs > 0 ? rawMs : Date.now();
      const dateKey = normalizeRestoreDateKey(a, ms);
      const id = makeRestoreDocId('att', { ...a, user, createdAtMs: ms }, i);
      await safeRestoreInsert('attendance', id, {
        user,
        name: String(a.name || a.nama || a.user || user),
        dateKey,
        lat: (a.lat ?? a.latitude ?? '') === '' ? null : Number(a.lat ?? a.latitude),
        lng: (a.lng ?? a.longitude ?? '') === '' ? null : Number(a.lng ?? a.longitude),
        createdAt: a.createdAt || a.created_at || Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
      attCount++;
    }

    for (let i = 0; i < transactions.length; i++) {
      const t = transactions[i] || {};
      const user = sanitizeUsername(t.user || t.username);
      if (!user) continue;
      const amount = Number(t.amount || t.nominal || t.harga || t.total || 0);
      if (!Number.isFinite(amount) || amount <= 0) continue;
      const rawMs = Number(t.createdAtMs || t.created_at_ms || (t.createdAt || t.created_at || t.time || t.waktu ? new Date(t.createdAt || t.created_at || t.time || t.waktu).getTime() : Date.now()));
      const ms = Number.isFinite(rawMs) && rawMs > 0 ? rawMs : Date.now();
      const dateKey = normalizeRestoreDateKey(t, ms);
      const monthKey = normalizeRestoreMonthKey(t, dateKey);
      const id = makeRestoreDocId('tx', { ...t, user, createdAtMs: ms }, i);
      await safeRestoreInsert('transactions', id, {
        user,
        name: String(t.name || t.nama || t.user || user),
        note: String(t.note || t.item || t.keterangan || t.barang || 'Transaksi'),
        amount, dateKey, monthKey,
        createdAt: t.createdAt || t.created_at || Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
      txCount++;
    }

    return { users: Array(userCount), attendance: Array(attCount), transactions: Array(txCount) };
  }
  async function restoreBackupFromFile() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const file = $('restore-file')?.files?.[0];

    setLoading(true);
    try {
      const raw = await file.text();

  async function restoreExcelFromFile() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const file = $('restore-excel-file')?.files?.[0];
    if (!file) return showToast('Pilih file Excel dulu!', true);
    setLoading(true);
    try {
      if (!window.XLSX) throw new Error('Library Excel belum siap');
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });

      const pickSheetRows = (name) => {
        const sheet = workbook.Sheets[name];
        if (!sheet) return [];
        return XLSX.utils.sheet_to_json(sheet, { defval: '' });
      };

      const backup = {
        version: 'excel-import',
        exportedAt: new Date().toISOString(),
        data: {
          users: pickSheetRows('users').map(u => ({
            username: sanitizeUsername(u.username),
            name: String(u.name || ''),
            pin: String(u.pin || ''),
            role: String(u.role || 'staff'),
            dailyBonusPercent: Number(u.dailyBonusPercent || u.daily_percent || u.persen_harian || 0),
            dailyBonusRate: Number(u.dailyBonusRate || 0) || (Number(u.dailyBonusPercent || u.daily_percent || u.persen_harian || 0) / 100),
            active: String(u.active || 'true') !== 'false',
            createdAt: u.createdAt || null
          })).filter(u => u.username),
          attendance: pickSheetRows('attendance').map(a => ({
            user: sanitizeUsername(a.user),
            name: String(a.name || a.user || ''),
            dateKey: String(a.dateKey || ''),
            lat: a.lat === '' ? null : Number(a.lat),
            lng: a.lng === '' ? null : Number(a.lng),
            createdAt: a.createdAt || null,
            createdAtMs: Number(a.createdAtMs || 0)
          })).filter(a => a.user),
          transactions: pickSheetRows('transactions').map(t => ({
            user: sanitizeUsername(t.user),
            name: String(t.name || t.user || ''),
            note: String(t.note || 'Transaksi'),
            amount: Number(t.amount || 0),
            dateKey: String(t.dateKey || ''),
            monthKey: String(t.monthKey || ''),
            createdAt: t.createdAt || null,
            createdAtMs: Number(t.createdAtMs || 0)
          })).filter(t => t.user)
        }
      };

      const result = await importBackupData(backup);
      if ($('restore-excel-file')) $('restore-excel-file').value = '';
      await logAudit('restore_data', { format: 'excel', users: result.users.length, attendance: result.attendance.length, transactions: result.transactions.length });
      showToast(`✓ Restore Excel selesai: ${result.users.length} user, ${result.attendance.length} absen, ${result.transactions.length} transaksi`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal restore Excel', true);
    }
    setLoading(false);
  }

  async function normalizeLegacyData() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    if (!confirm('Normalisasi data lama? Ini akan menambah field dateKey/monthKey/createdAtMs yang belum ada.')) return;
    setLoading(true);
    try {
      let updated = 0;
      const userSnap = await getDocs(collection(db, 'users'));
      for (const item of userSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        if (data.active === undefined) patch.active = true;
        if (data.username && data.username !== sanitizeUsername(data.username)) patch.username = sanitizeUsername(data.username);
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'users', item.id), patch, { merge: true });
          updated++;
        }
      }

      const attSnap = await getDocs(collection(db, 'attendance'));
      for (const item of attSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.user && data.username) patch.user = sanitizeUsername(data.username);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'attendance', item.id), patch, { merge: true });
          updated++;
        }
      }

      const trxSnap = await getDocs(collection(db, 'transactions'));
      for (const item of trxSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.monthKey && dk) patch.monthKey = dk.slice(0, 7);
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (data.deleted === undefined) patch.deleted = false;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'transactions', item.id), patch, { merge: true });
          updated++;
        }
      }

      await logAudit('normalize_legacy_data', { updated });
      showToast(`✓ Normalisasi selesai (${updated} update)`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal normalisasi data', true);
    }
    setLoading(false);
  }

              <p style="font-size:17px;font-weight:700;margin-top:12px;letter-spacing:-0.01em">${escapeHtml(currentUser.name)}</p>
              <p style="font-size:12.5px;color:var(--text-soft);margin-top:2px">@${escapeHtml(currentUser.username)} · ${getRoleLabel()}</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:7px;padding-bottom:18px" class="page-in s1">
              <button onclick="toggleTheme()" class="setting-row">
                <div class="setting-ico" style="background:var(--amber-dim)"><i class="fas fa-circle-half-stroke" style="color:var(--amber)"></i></div>
                <span class="setting-label">Mode Tampilan</span>
                <span style="font-size:11px;font-weight:600;color:var(--text-soft);margin-right:8px;text-transform:capitalize">${getTheme() === 'dark' ? '🌙 Gelap' : '☀️ Terang'}</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              <button onclick="updateLocation();showToast('Refresh lokasi')" class="setting-row">
                <div class="setting-ico" style="background:var(--green-dim)"><i class="fas fa-location-dot" style="color:var(--green)"></i></div>
                <span class="setting-label">Refresh Lokasi</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              <button onclick="seedDemoUser()" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-user-plus" style="color:var(--accent)"></i></div>
                <span class="setting-label">Pastikan User Demo Aji</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              ${isAdmin() ? `<button onclick="setSelectedUserFilter('all')" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-users" style="color:var(--accent)"></i></div>
                <span class="setting-label">Reset Filter ke Semua User</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>` : ''}
              <button onclick="logout()" class="setting-row">
                <div class="setting-ico" style="background:var(--red-dim)"><i class="fas fa-right-from-bracket" style="color:var(--red)"></i></div>
                <span class="setting-label">Keluar Aplikasi</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              ${isAdmin() ? `<button onclick="router.navigate('adminLogs')" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-clock-rotate-left" style="color:var(--accent)"></i></div>
                <span class="setting-label">Log Aktivitas Admin</span>
                <span style="font-size:11px;font-weight:700;color:var(--text-soft);margin-right:8px">${cachedAuditLogs.length} log</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>` : ''}
              ${isAdmin() ? `<button onclick="toggleAdminMoreMenu()" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-layer-group" style="color:var(--accent)"></i></div>
                <span class="setting-label">Admin Pro</span>
                <span style="font-size:11px;font-weight:700;color:var(--text-soft);margin-right:8px">${adminMoreOpen ? 'Tutup' : 'Buka'}</span>
                <i class="fas ${adminMoreOpen ? 'fa-chevron-up' : 'fa-chevron-down'} setting-arrow"></i>
              </button>` : ''}
              <div class="card" style="padding:14px 16px;margin-top:8px">
                <p class="label-xs">Info Supabase</p>
                <div id="settings-summary"></div>
              </div>
            </div>
          </div>`;
        renderSettingsSummary();
      }
    }
  };

  function setHistoryFilter(f) { historyFilter = f; resetHistoryDisplayLimit(); renderHistory(); }
  function filterHistoryByDateRange() {
    const s = $('history-range-start')?.value, e = $('history-range-end')?.value;
    if (s && e) { rangeStartDate = s; rangeEndDate = e; historyFilter = 'range'; resetHistoryDisplayLimit(); renderHistory(); }
    else showToast('Pilih tanggal!', true);
  }
  function resetHistoryFilter() { rangeStartDate = null; rangeEndDate = null; historyFilter = 'daily'; resetHistoryDisplayLimit(); renderHistory(); }
  function setReportFilter(f) {
    reportFilter = f;
    ['daily','monthly','yearly'].forEach(tab => {
      const b = $('f-' + tab); if (b) b.classList.toggle('active', tab === f);
    });
    renderReport();
  }


  function setSelectedUserFilter(value) {
    selectedUserFilter = value || 'all';
    updateHomeStats();
    resetHistoryDisplayLimit();
    resetInactiveUserLimit();
    if (currentPage === 'history') renderHistory();
    if (currentPage === 'report') renderReport();
    if (currentPage === 'settings') renderSettingsSummary();
  }

  async function seedDemoUser() {
    setLoading(true);
    try { await seedDemoUserIfMissing(); showToast('✓ User demo siap: aji / 123456'); }
    catch (e) { showToast('Gagal buat user demo', true); }
    setLoading(false);
  }

  window.increaseAuditLogLimit = increaseAuditLogLimit;
  window.toggleTheme = toggleTheme;
  window.login = login;
  window.toggleAdminMoreMenu = toggleAdminMoreMenu;
  window.toggleAdminSettingPanel = toggleAdminSettingPanel;
  window.closeAdminSettingPanels = closeAdminSettingPanels;
  window.logout = logout;
  window.handleClockIn = handleClockIn;
  window.openTransactionModal = openTransactionModal;
  window.closeTransactionModal = closeTransactionModal;
  window.handleTransactionFromModal = handleTransactionFromModal;
  window.handleClosingDay = handleClosingDay;
  window.handleEditClosingTime = handleEditClosingTime;
  window.handleCancelClosingToday = handleCancelClosingToday;
  window.renderAdminClosingPanel = renderAdminClosingPanel;
  window.renderAdminClosingPanelMaybe = renderAdminClosingPanelMaybe;
  window.saveBonusSettings = saveBonusSettings;
  window.resetBonusSettingsForm = resetBonusSettingsForm;
  window.deleteTransaction = deleteTransaction;
  window.restoreDeletedTransaction = restoreDeletedTransaction;
  window.hardDeleteTransaction = hardDeleteTransaction;
  window.bulkRestoreDeletedTransactions = bulkRestoreDeletedTransactions;
  window.bulkHardDeleteDeletedTransactions = bulkHardDeleteDeletedTransactions;
  window.setRecycleSearch = setRecycleSearch;
  window.setRecycleUserFilter = setRecycleUserFilter;
  window.resetRecycleFilters = resetRecycleFilters;
  window.increaseRecycleBinLimit = increaseRecycleBinLimit;
  window.increaseHistoryDisplayLimit = increaseHistoryDisplayLimit;
  window.increaseInactiveUserLimit = increaseInactiveUserLimit;
  window.filterHistoryByDateRange = filterHistoryByDateRange;
  window.resetHistoryFilter = resetHistoryFilter;
  window.setHistoryFilter = setHistoryFilter;
  window.setReportFilter = setReportFilter;
  window.setSelectedUserFilter = setSelectedUserFilter;
  window.seedDemoUser = seedDemoUser;
  window.fillAdminUserForm = fillAdminUserForm;
  window.clearAdminUserForm = clearAdminUserForm;
  window.saveAdminUser = saveAdminUser;
  window.deleteAdminUser = deleteAdminUser;
  window.hardDeleteAdminUser = hardDeleteAdminUser;
  window.downloadBackup = downloadBackup;
  window.restoreBackupFromFile = restoreBackupFromFile;
  window.restoreExcelFromFile = restoreExcelFromFile;
  window.handleRestoreProFile = handleRestoreProFile;
  window.clearRestoreProFile = clearRestoreProFile;
  window.restoreProFromFile = restoreProFromFile;
  window.resetAllAppData = resetAllAppData;
  window.normalizeLegacyData = normalizeLegacyData;
  window.router = router;
  window.updateLocation = updateLocation;

  async function refreshTransactionsNow() {
    if (!currentUser) return;
    try {
      const qy = isAdmin()
        ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
        : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
      const snap = await getDocs(qy);
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      const closingSnap = await getDocs(query(collection(db, 'closings'), limit(CLOSING_SYNC_LIMIT)));
      cachedClosings = sortByCreatedDesc(closingSnap.docs.map(d => ({ id: d.id, ...d.data() })));
      const bonusSnap = await getDoc(doc(db, 'closings', '__bonus_settings'));
      if (bonusSnap.exists()) {
        const data = bonusSnap.data() || {};
        cachedBonusSettings = {
          transactionBonusRate: Number.isFinite(Number(data.transactionBonusRate)) ? Number(data.transactionBonusRate) : DEFAULT_TRANSACTION_BONUS_RATE,
          closingBonusPerMinute: Number.isFinite(Number(data.closingBonusPerMinute)) ? Number(data.closingBonusPerMinute) : DEFAULT_CLOSING_BONUS_PER_MINUTE,
          updatedAtMs: Number(data.updatedAtMs || 0),
          updatedBy: data.updatedBy || '',
          updatedByName: data.updatedByName || ''
        };
      }
      refreshCurrentPage();
    } catch (e) {
      console.error('refreshTransactionsNow gagal:', e);
    }
  }

  window.addEventListener('online', () => { renderSettingsSummary(); if (currentUser) bindRealtimeData(); });
  window.addEventListener('offline', () => renderSettingsSummary());
  let lastForegroundRefreshAt = 0;
  async function refreshForegroundData() {
    if (!currentUser) return;
    const now = Date.now();
    if (now - lastForegroundRefreshAt < 1500) return;
    lastForegroundRefreshAt = now;
    preloadAttendanceCache();
    refreshCurrentPage();
    await refreshTransactionsNow();
  }

  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden && currentUser) await refreshForegroundData();
  });
  window.addEventListener('focus', async () => {
    if (currentUser) await refreshForegroundData();
  });

  (async () => {
    if (await restoreSession()) router.navigate('home');
    else router.navigate('login');
  })();
</script>
</body>
</html>
