<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Rocky Hijab Supabase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root { --transition-theme: background .3s ease, color .3s ease, border-color .3s ease; }
    [data-theme="dark"]{
      --bg:#0a0d14; --bg2:#0f1420; --bg3:#141a2a; --surface:rgba(255,255,255,.04); --surface-hover:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08); --border-focus:rgba(99,155,255,.5); --text:#eef2ff; --text-soft:#7a85a0; --text-ghost:#3a4258;
      --accent:#5b8fff; --accent-dim:rgba(91,143,255,.15); --accent-glow:rgba(91,143,255,.25); --green:#52d89e; --green-dim:rgba(82,216,158,.12);
      --red:#ff6b6b; --red-dim:rgba(255,107,107,.12); --amber:#ffc46b; --amber-dim:rgba(255,196,107,.12); --nav-bg:rgba(10,13,20,.92); --shadow:0 8px 32px rgba(0,0,0,.5);
    }
    [data-theme="light"]{
      --bg:#f0f2f8; --bg2:#ffffff; --bg3:#f7f8fc; --surface:rgba(0,0,0,.03); --surface-hover:rgba(0,0,0,.055);
      --border:rgba(0,0,0,.07); --border-focus:rgba(64,120,240,.4); --text:#0f1523; --text-soft:#5c6478; --text-ghost:#aab0c0;
      --accent:#3b6df0; --accent-dim:rgba(59,109,240,.1); --accent-glow:rgba(59,109,240,.2); --green:#18a96b; --green-dim:rgba(24,169,107,.1);
      --red:#e84545; --red-dim:rgba(232,69,69,.1); --amber:#e8960a; --amber-dim:rgba(232,150,10,.1); --nav-bg:rgba(255,255,255,.92); --shadow:0 8px 32px rgba(0,0,0,.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--transition-theme);-webkit-font-smoothing:antialiased}
    #app{max-width:430px;min-height:100vh;margin:0 auto;position:relative;background:var(--bg);overflow-x:hidden}
    [data-theme="dark"] #app::before{content:'';position:fixed;top:-120px;left:-80px;width:320px;height:320px;background:radial-gradient(circle, rgba(91,143,255,.09) 0%, transparent 70%);pointer-events:none;z-index:0}
    #page-content{position:relative;z-index:1;padding-bottom:96px}
    .page-pad{padding:0 18px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;transition:background .15s,var(--transition-theme)}
    .page-title{font-size:24px;font-weight:800;letter-spacing:-.025em}
    .page-subtitle{font-size:12.5px;color:var(--text-soft);margin-top:2px}
    .label-xs{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:10px}
    .g-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;min-height:44px;line-height:1.45;font-size:14px;color:var(--text);outline:none;transition:border-color .18s,background .18s,var(--transition-theme)}
    .g-input:focus{border-color:var(--border-focus);background:var(--accent-dim)}
    .g-input::placeholder{color:var(--text-ghost)}
    .btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .14s ease;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
    .btn:active{transform:scale(.97);opacity:.9}
    .btn:disabled{opacity:.45;pointer-events:none}
    .btn-primary{background:var(--accent);color:white;border-radius:12px;box-shadow:0 4px 18px var(--accent-glow)}
    .btn-glass{background:var(--surface);border:1px solid var(--border)!important;border-radius:12px;color:var(--text-soft)}
    .btn-danger{background:var(--red-dim);border:1px solid rgba(255,107,107,.2)!important;color:var(--red);border-radius:10px}
    .btn-success{background:linear-gradient(135deg, #16a34a, #15803d);color:white;border-radius:12px}
    .theme-toggle{width:38px;height:38px;background:var(--surface);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-soft);flex-shrink:0}
    .header-actions{display:flex;gap:8px;align-items:center}
    .stat-hero{background:linear-gradient(140deg, var(--bg3) 0%, var(--bg2) 100%);border:1px solid var(--border);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .stat-hero{background:linear-gradient(140deg,#131d36 0%, #0d1526 100%);border-color:rgba(91,143,255,.15)}
    .stat-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);pointer-events:none}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:-.03em;position:relative;z-index:1}
    .stat-sub{font-size:11.5px;color:var(--text-soft);margin-top:5px;position:relative;z-index:1}
    .stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:center}
    .stat-mini-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1.1}
    .stat-mini-lbl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:5px}
    .bonus-card{border:1px solid rgba(255,196,107,.18);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .bonus-card{background:#1a1800}[data-theme="light"] .bonus-card{background:#fffaf0}
    .bonus-card::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle, rgba(255,196,107,.18) 0%, transparent 70%)}
    .modal-wrap{position:fixed;inset:0;background:rgba(5,8,16,.75);backdrop-filter:blur(14px);z-index:150;display:none;align-items:flex-end;justify-content:center}
    .modal-wrap.show{display:flex}
    .modal-sheet{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px 20px 40px;box-shadow:var(--shadow)}
    .modal-pill{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 14px}
    .amount-display{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--accent);text-align:right;width:100%;background:none;border:none;outline:none}
    #bottom-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--nav-bg);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:22px;display:flex;justify-content:space-around;align-items:center;height:62px;z-index:100;padding:0 6px;box-shadow:var(--shadow)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border-radius:14px;cursor:pointer;background:none;border:none;color:var(--text-ghost);min-width:52px}
    .nav-item i{font-size:17px}.nav-item span{font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .nav-item.active{background:var(--accent-dim);color:var(--accent)}
    .fab-add{position:fixed;right:22px;bottom:86px;width:58px;height:58px;border-radius:18px;border:none;background:var(--accent);color:white;display:none;align-items:center;justify-content:center;box-shadow:0 10px 28px var(--accent-glow);z-index:110;cursor:pointer;font-size:22px}
    #loading{position:fixed;inset:0;background:rgba(10,13,20,.7);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
    .loader-ring{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-8px) scale(.95);z-index:300;padding:10px 18px;border-radius:100px;font-size:12.5px;font-weight:600;opacity:0;transition:all .22s cubic-bezier(.34,1.5,.64,1);white-space:nowrap;max-width:calc(100% - 40px);text-align:center;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
    .loc-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;font-size:11.5px;font-weight:600}
    .loc-in{background:var(--green-dim);color:var(--green);border:1px solid rgba(82,216,158,.2)}
    .loc-out{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .loc-loading{background:var(--surface);color:var(--text-ghost);border:1px solid var(--border)}
    .tab-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px;display:flex;gap:2px}
    .tab-btn{flex:1;padding:8px 4px;border-radius:9px;font-size:11px;font-weight:600;color:var(--text-ghost);background:none;border:none;cursor:pointer}
    .tab-btn.active{background:var(--accent);color:white}
    .trx-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px}
    .trx-icon{width:38px;height:38px;background:var(--accent-dim);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--accent)}
    .trx-amount{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
    .trx-note{font-size:11.5px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
    .trx-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-ghost);margin-top:3px}
    .setting-row{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
    .setting-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .setting-label{font-size:13px;font-weight:500;color:var(--text);flex:1;text-align:left}
    .setting-arrow{color:var(--text-ghost);font-size:10px}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .badge-blue{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(91,143,255,.2)}
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid}
    .status-ok{background:var(--green-dim);color:var(--green);border-color:rgba(82,216,158,.2)}
    .status-warn{background:var(--red-dim);color:var(--red);border-color:rgba(255,107,107,.2)}
    .login-brand{width:78px;height:78px;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;position:relative}
    [data-theme="dark"] .login-brand{background:linear-gradient(135deg,#1a2a50 0%,#0d1830 100%);border:1px solid rgba(212,175,55,.25)}
    [data-theme="light"] .login-brand{background:linear-gradient(135deg,#dde8ff 0%,#c5d8ff 100%);border:1px solid rgba(59,109,240,.2)}
    .sync-btn{padding:7px 12px;background:var(--accent-dim);border:1px solid rgba(91,143,255,.2);border-radius:10px;color:var(--accent);font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
    .user-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text-soft)}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .page-in{animation:pageIn .22s ease both}.s1{animation-delay:.04s}.s2{animation-delay:.08s}.s3{animation-delay:.12s}.s4{animation-delay:.16s}
    @keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="loader-ring"></div>
    <p style="font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.07em">MEMPROSES</p>
  </div>
  <div id="toast">Toast</div>

  <div id="transaction-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div class="modal-pill"></div>
      <div class="modal-ico" style="background:var(--accent-dim);border:1px solid rgba(91,143,255,0.2)">
        <i class="fas fa-plus" style="color:var(--accent)"></i>
      </div>
      <h3 style="font-size:16px;font-weight:700;text-align:center;margin-bottom:4px">Tambah Transaksi</h3>
      <p style="font-size:12px;color:var(--text-soft);text-align:center;margin-bottom:16px">Input transaksi baru</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Keterangan / Item</p>
          <input id="modal-pos-note" type="text" placeholder="Pashmina, Hijab, dll..." class="g-input" style="background:none;border:none;padding:4px 0 2px;font-size:15px;line-height:1.45;min-height:30px;display:block">
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Nominal</p>
          <input id="modal-pos-amount" type="text" inputmode="numeric" placeholder="0" class="amount-display" data-numeric="0">
        </div>
      </div>
      <div id="modal-pos-status" style="margin:14px 0 0"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="flex:1;padding:12px;font-size:13px">Batal</button>
        <button onclick="handleTransactionFromModal()" class="btn btn-primary" style="flex:1;padding:12px;font-size:13px">Simpan</button>
      </div>
    </div>
  </div>

  <div id="page-content"></div>

  <nav id="bottom-nav" style="display:none">
    <button onclick="router.navigate('home')" id="nav-home" class="nav-item"><i class="fas fa-house"></i><span id="nav-home-label">Beranda</span></button>
    <button onclick="router.navigate('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt"></i><span id="nav-history-label">Riwayat</span></button>
    <button onclick="router.navigate('report')" id="nav-report" class="nav-item"><i class="fas fa-chart-line"></i><span id="nav-report-label">Laporan</span></button>
    <button onclick="router.navigate('settings')" id="nav-settings" class="nav-item"><i class="fas fa-gear"></i><span id="nav-settings-label">Setelan</span></button>
  </nav>

  <button id="fab-pos" class="fab-add" onclick="openTransactionModal()" aria-label="Tambah transaksi">
    <i class="fas fa-plus"></i>
  </button>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  // === ISI DARI SUPABASE DASHBOARD > Project Settings > API ===
  const supabaseConfig = {
    url: "https://xdgqtdsyeirjwauojbfm.supabase.co",
    anonKey: "sb_publishable_wWF0ES1DCl_OyenfNYwCSQ_awULnllr",
    projectId: "xdgqtdsyeirjwauojbfm"
  };

  const supabase = createClient(supabaseConfig.url, supabaseConfig.anonKey, {
    realtime: { params: { eventsPerSecond: 10 } }
  });
  const SECURE_SESSION_TOKEN_KEY = 'rocky_supabase_secure_token_v1';
  let appSessionToken = localStorage.getItem(SECURE_SESSION_TOKEN_KEY) || '';

  async function secureRpc(fn, args = {}) {
    const { data, error } = await supabase.rpc(fn, args);
    if (error) {
      console.error('RPC error:', fn, error);
      throw new Error(error.message || 'Supabase RPC gagal');
    }
    return data;
  }

  // Adapter kecil supaya logika lama Firestore tetap jalan di Supabase.
  // Database Supabase pakai snake_case, aplikasi lama tetap pakai camelCase.
  const db = supabase;
  const firebaseConfig = supabaseConfig;

  const FIELD_TO_DB = {
    dateKey: 'date_key', monthKey: 'month_key', createdAt: 'created_at', createdAtMs: 'created_at_ms',
    deletedAt: 'deleted_at', deletedAtMs: 'deleted_at_ms', deletedBy: 'deleted_by', deletedByName: 'deleted_by_name',
    actorName: 'actor_name', updatedAt: 'updated_at', updatedBy: 'updated_by'
  };
  const FIELD_FROM_DB = Object.fromEntries(Object.entries(FIELD_TO_DB).map(([a,b]) => [b,a]));

  function toDbField(field) { return FIELD_TO_DB[field] || field; }
  function fromDbRow(row = {}) {
    const out = {};
    for (const [k, v] of Object.entries(row || {})) out[FIELD_FROM_DB[k] || k] = v;
    if (out.loc && typeof out.loc === 'object') {
      if (out.lat == null && out.loc.lat != null) out.lat = out.loc.lat;
      if (out.lng == null && out.loc.lng != null) out.lng = out.loc.lng;
    }
    return out;
  }
  function toDbPayload(data = {}) {
    const out = {};
    for (const [k, v] of Object.entries(data || {})) {
      if (v === undefined) continue;
      const key = toDbField(k);
      out[key] = v;
    }
    if (data.loc && typeof data.loc === 'object') {
      if (out.lat == null && data.loc.lat != null) out.lat = data.loc.lat;
      if (out.lng == null && data.loc.lng != null) out.lng = data.loc.lng;
    }
    return out;
  }
  function normalizeDoc(table, row) {
    const data = fromDbRow(row || {});
    const id = data.id || data.username || row?.id || row?.username;
    return { id, data: () => data, exists: () => !!row };
  }
  function normalizeSnapRows(table, rows = []) {
    return { docs: (rows || []).map(row => normalizeDoc(table, row)) };
  }
  function collection(_db, table) { return { table }; }
  function doc(_db, table, id) { return { table, id }; }
  function where(field, op, value) { return { type:'where', field, op, value }; }
  function orderBy(field, dir = 'asc') { return { type:'orderBy', field, dir }; }
  function limit(count) { return { type:'limit', count }; }
  function query(coll, ...clauses) { return { table: coll.table, clauses }; }
  function serverTimestamp() { return new Date().toISOString(); }
  const Timestamp = { fromMillis: (ms) => new Date(Number(ms || Date.now())).toISOString() };
  function getFilterObject(q) {
    const filters = {};
    for (const c of (q.clauses || [])) {
      if (c.type === 'where' && c.op === '==') filters[toDbField(c.field)] = c.value;
    }
    return filters;
  }
  function getOrderClause(q) {
    return (q.clauses || []).find(c => c.type === 'orderBy') || null;
  }
  function getLimitClause(q) {
    return (q.clauses || []).find(c => c.type === 'limit') || null;
  }
  function applyLocalClauses(rows, q) {
    let out = [...(rows || [])];
    for (const c of (q.clauses || [])) {
      if (c.type === 'where') {
        const field = c.field;
        if (c.op === '==') out = out.filter(r => String(r[field] ?? '') === String(c.value ?? ''));
        else if (c.op === '!=') out = out.filter(r => String(r[field] ?? '') !== String(c.value ?? ''));
      }
    }
    const order = getOrderClause(q);
    if (order) {
      const dir = String(order.dir || 'asc').toLowerCase();
      out.sort((a,b) => {
        const av = a[order.field] ?? '', bv = b[order.field] ?? '';
        if (av === bv) return 0;
        return (av > bv ? 1 : -1) * (dir === 'desc' ? -1 : 1);
      });
    }
    const lim = getLimitClause(q);
    if (lim) out = out.slice(0, lim.count);
    return out;
  }
  async function secureSelect(q) {
    if (!appSessionToken) throw new Error('Session kosong. Login ulang.');
    const realQ = typeof q === 'string' ? { table:q, clauses:[] } : q;
    const order = getOrderClause(realQ);
    const lim = getLimitClause(realQ);
    const rows = await secureRpc('app_select', {
      p_token: appSessionToken,
      p_table: realQ.table,
      p_filters: getFilterObject(realQ),
      p_order: order ? toDbField(order.field) : null,
      p_dir: order ? (order.dir || 'asc') : 'asc',
      p_limit: lim ? lim.count : 1000
    });
    return applyLocalClauses((rows || []).map(fromDbRow), realQ);
  }
  async function getDoc(ref) {
    const key = ref.table === 'users' ? 'username' : 'id';
    const rows = await secureSelect({ table: ref.table, clauses: [where(key, '==', ref.id), limit(1)] });
    return normalizeDoc(ref.table, rows[0] || null);
  }
  async function setDoc(ref, data, options = {}) {
    if (!appSessionToken) throw new Error('Session kosong. Login ulang.');
    const payload = toDbPayload(data);
    if (ref.table === 'users') payload.username = ref.id;
    else payload.id = ref.id;
    const row = await secureRpc('app_upsert', {
      p_token: appSessionToken,
      p_table: ref.table,
      p_id: String(ref.id),
      p_payload: payload
    });
    return row;
  }
  async function addDoc(coll, data) {
    if (!appSessionToken) throw new Error('Session kosong. Login ulang.');
    const inserted = await secureRpc('app_insert', {

  function onSnapshot(q, cb, errCb) {
    const realQ = typeof q === 'string' ? { table:q, clauses:[] } : q;
    let closed = false;
    let debounceTimer = null;

    const refresh = () => {
      if (closed) return;
      fetchQuerySnapshot(realQ, cb, errCb);
    };

    const scheduleRefresh = (delay = 180) => {
      if (closed) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(refresh, delay);
    };

    // Load pertama tetap lewat RPC secure.
    refresh();

    // Realtime aman: client cuma dengar tabel sinyal realtime_pings.
    // Data asli tetap diambil lewat RPC secure sesuai session token.
    const channelName = `rocky_rt_${realQ.table}_${Math.random().toString(36).slice(2)}`;
    const channel = supabase
      .channel(channelName)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'realtime_pings' }, (payload) => {
        const changedTable = payload?.new?.table_name || '';
        if (!changedTable || changedTable === realQ.table) scheduleRefresh();
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') console.log('Realtime aktif:', realQ.table);
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('Realtime fallback polling:', realQ.table, status);
        }
      });

    // Fallback hemat kalau websocket putus / HP sleep.
    const timer = setInterval(refresh, 30000);

    return () => {
      closed = true;
      clearTimeout(debounceTimer);
      clearInterval(timer);
      try { supabase.removeChannel(channel); } catch (e) { console.warn('removeChannel gagal:', e); }
    };
  }

      appSessionToken = localStorage.getItem(SECURE_SESSION_TOKEN_KEY) || '';
      if (!raw || !appSessionToken) return false;
      const freshUser = await secureRpc('app_session', { p_token: appSessionToken });
      currentUser = { username: sanitizeUsername(freshUser.username), name: freshUser.name, pin: String(freshUser.pin), role: freshUser.role || 'staff', active: freshUser.active !== false };
      localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
      cachedTransactions = [];
      cachedAttendance = [];
      cachedAuditLogs = [];
      preloadAttendanceCache();
      bindRealtimeData();
      return true;
    } catch (e) {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(SECURE_SESSION_TOKEN_KEY);
      appSessionToken = '';
      return false;
    }
  }


  function bindRealtimeData() {
    if (!currentUser) return;
    attendanceReady = false;
    preloadAttendanceCache();
    if (unsubTransactions) unsubTransactions();
    if (unsubAttendance) unsubAttendance();
    if (unsubUsers) { unsubUsers(); unsubUsers = null; }
    if (unsubAuditLogs) { unsubAuditLogs(); unsubAuditLogs = null; }

    // Jangan pakai orderBy('createdAt') di query staff karena data lama/migrasi
    // bisa belum konsisten field createdAt-nya. Itu bikin transaksi staff kadang
    // kosong setelah clear cache/data, padahal admin masih bisa lihat.
    const tq = isAdmin()
      ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
    unsubTransactions = onSnapshot(tq, (snap) => {
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      refreshCurrentPage();
    }, async (err) => {
      console.error(err);
      try {
        const fallbackQ = isAdmin()
          ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
          : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
        const fallbackSnap = await getDocs(fallbackQ);
        cachedTransactions = sortByCreatedDesc(
          fallbackSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        );
        refreshCurrentPage();
      } catch (e) {
        console.error('Fallback transaksi gagal:', e);
      }
    });

    const aq = isAdmin()
      ? query(collection(db, 'attendance'), limit(ATT_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'attendance'), where('user', '==', sanitizeUsername(currentUser.username)), limit(ATT_SYNC_LIMIT_STAFF));
    unsubAttendance = onSnapshot(aq, (snap) => {
      stripCachedAttendance();
      cachedAttendance = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => !isRecordDeleted(a))
      );
      if (!isAdmin()) {
        const today = toDateKey(nowDate());
        const todayRec = cachedAttendance.find(a => extractDateKey(a) === today && sanitizeUsername(a.user) === currentUser.username);
        if (todayRec) {
          const createdAtMs = getRecordTimeMs(todayRec) || Date.now();
          saveAttendanceCache(currentUser.username, { dateKey: today, createdAtMs });
        } else {
          clearAttendanceCache(currentUser.username);
        }
      }
      attendanceReady = true;
      refreshCurrentPage();
    }, (err) => { attendanceReady = true; console.error(err); refreshCurrentPage(); });

    if (isAdmin()) {
      const uq = query(collection(db, 'users'), orderBy('name'));
      unsubUsers = onSnapshot(uq, (snap) => {
        cachedUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        refreshCurrentPage();
      }, (err) => console.error(err));

      const lq = query(collection(db, 'audit_logs'), orderBy('createdAt', 'desc'), limit(AUDIT_SYNC_LIMIT));
      unsubAuditLogs = onSnapshot(lq, (snap) => {
        cachedAuditLogs = sortByCreatedDesc(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        refreshCurrentPage();
      }, (err) => console.error(err));
    } else {
      cachedUsers = currentUser ? [{ username: currentUser.username, name: currentUser.name, role: currentUser.role || 'staff', active: true }] : [];
      cachedAuditLogs = [];
    }

    applyNavRoleLabels();
  }

  async function refreshCurrentPage() {
    if (!currentUser) return;
    if (currentPage === 'home') { await updateHomeStatus(); await updateHomeStats(); }
    else if (currentPage === 'history') await renderHistory();
    else if (currentPage === 'report') await renderReport();
    else if (currentPage === 'settings') await renderSettingsSummary();
  }

  function hasClockedInToday() {
    const today = toDateKey(nowDate());
    const me = sanitizeUsername(currentUser?.username || '');
    return cachedAttendance.some(a => extractDateKey(a) === today && (!me || sanitizeUsername(a.user) === me));
  }
  function canTransactNow() {
    if (isAdmin()) return true;
    if (!attendanceReady) return false;
    return hasClockedInToday();
  }
  function getTodayAttendanceRecord() {
    const today = toDateKey(nowDate());
    return sortByCreatedDesc(cachedAttendance.filter(a => extractDateKey(a) === today))[0] || null;
  }

  function updateLocation() {
    const info = $('loc-info'); if (!info) return;
    info.innerHTML = `<span class="loc-chip loc-loading"><i class="fas fa-circle-notch fa-spin" style="font-size:10px"></i> Mencari GPS...</span>`;
    if (!navigator.geolocation) {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> GPS tidak didukung</span>`; return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const dist = calculateDistance(currentPos.lat, currentPos.lng, OFFICE_LOC.lat, OFFICE_LOC.lng);
      info.innerHTML = dist <= RADIUS_LIMIT
        ? `<span class="loc-chip loc-in"><i class="fas fa-circle" style="font-size:6px"></i> Dalam Radius · ${Math.round(dist)}m</span>`
        : `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> Diluar Radius · ${Math.round(dist)}m</span>`;
      updateHomeStatus();
    }, () => {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-triangle-exclamation"></i> Gagal ambil lokasi</span>`;
    }, { enableHighAccuracy:true, timeout:10000, maximumAge:30000 });
  }

  async function handleClockIn() {
    if (isBusy) return;
    if (!currentUser) return;
    if (hasClockedInToday()) return showToast('Sudah absen hari ini!');
    if (!currentPos) return showToast('Tunggu lokasi!', true);
    const dist = calculateDistance(currentPos.lat, currentPos.lng, OFFICE_LOC.lat, OFFICE_LOC.lng);
    if (dist > RADIUS_LIMIT) return showToast(`Di luar radius (${Math.round(dist)}m)`, true);
    setLoading(true);
    try {
      const nowMs = Date.now();
      const todayKey = toDateKey(nowDate());
      saveAttendanceCache(currentUser.username, { dateKey: todayKey, createdAtMs: nowMs });
      cachedAttendance = [{
        id: `cached_${currentUser.username}_${todayKey}`,
        user: sanitizeUsername(currentUser.username),
        name: currentUser.name,
        dateKey: todayKey,
        createdAtMs: nowMs,
        __cached: true
      }, ...cachedAttendance.filter(a => !a.__cached)];
      attendanceReady = true;
      refreshCurrentPage();
      await addDoc(collection(db, 'attendance'), {
        user: sanitizeUsername(currentUser.username),
        name: currentUser.name,
        dateKey: todayKey,
        createdAt: serverTimestamp(),
        createdAtMs: nowMs,
        loc: currentPos
      });
      showToast('✓ Absen berhasil');
    } catch (e) {
      showToast('Gagal absen', true);
    }
    setLoading(false);
  }

  function bindTransactionAmountFormatter(inputId) {
    const input = $(inputId);
    if (!input || input.dataset.bound === 'true') return;
    input.dataset.bound = 'true';
    input.addEventListener('input', function () {
      const numeric = (this.value || '').replace(/\D/g, '');
      const value = parseInt(numeric || '0', 10);
      this.setAttribute('data-numeric', String(value));
      this.value = numeric ? formatRupiah(value) : '';
    });
  }

    if (!currentUser) return showToast('Silakan login dulu!', true);
    const modal = $('transaction-modal');
    bindTransactionAmountFormatter('modal-pos-amount');
    modal.classList.add('show');

    } else if (!attendanceReady) {

    } else {
      statusBox.innerHTML = `<div style="display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--red-dim);border:1px solid rgba(255,107,107,0.2);border-radius:11px"><i class="fas fa-circle-xmark" style="color:var(--red);font-size:13px"></i><span style="font-size:12.5px;color:var(--red);font-weight:600">Absen dulu sebelum transaksi!</span></div>`;

  async function handleTransactionFromModal() {
    if (isBusy) return;
    if (!canTransactNow()) {
      showToast('Absen dulu sebelum transaksi!', true);
      closeTransactionModal();
      setTimeout(() => router.navigate('home'), 500);
      return;

    try {
      await addDoc(collection(db, 'transactions'), {
        user: sanitizeUsername(currentUser.username),
        name: currentUser.name,
        amount,
        note,
        dateKey: toDateKey(nowDate()),
        monthKey: toMonthKey(nowDate()),
        createdAt: serverTimestamp(),
        createdAtMs: Date.now()
      });
      showToast('✓ Transaksi disimpan!');
      closeTransactionModal();
    } catch (e) {
      showToast('Gagal transaksi', true);
    }
    setLoading(false);
  }

  async function deleteTransaction(id) {
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const trx = cachedTransactions.find(t => t.id === id);
    if (!trx) return showToast('Transaksi tidak ditemukan!', true);
    if (trx.user !== currentUser.username && !isAdmin()) return showToast('Tidak bisa hapus transaksi orang lain!', true);
    const pin = prompt(`Hapus transaksi Rp ${formatRupiah(trx.amount)}?\nMasukkan PIN:`);
    if (!pin) return;
    if (String(pin) !== String(currentUser.pin)) return showToast('PIN salah!', true);
    setLoading(true);
    try {
      await setDoc(doc(db, 'transactions', id), {
        deleted: true,
        deletedAt: serverTimestamp(),
        deletedAtMs: Date.now(),
        deletedBy: currentUser.username,
        deletedByName: currentUser.name
      }, { merge: true });
      await logAudit('transaction_soft_delete', { id, user: trx.user, amount: Number(trx.amount || 0), note: trx.note || 'Transaksi' });
      showToast(`✓ Transaksi dihapus aman`);
    } catch (e) {
      console.error(e);
      showToast('Gagal hapus', true);
    }
    setLoading(false);
  }


  async function restoreDeletedTransaction(id) {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const trx = cachedTransactions.find(t => t.id === id);
    if (!trx) return showToast('Transaksi tidak ditemukan!', true);
    if (!isRecordDeleted(trx)) return showToast('Transaksi ini belum dihapus.', true);
    const pin = prompt(`Pulihkan transaksi Rp ${formatRupiah(trx.amount)}?\nMasukkan PIN admin:`);
    if (!pin) return;
    if (String(pin) !== String(currentUser.pin)) return showToast('PIN salah!', true);
    setLoading(true);
    try {
      await setDoc(doc(db, 'transactions', id), {
        deleted: false,
        deletedAt: null,
        deletedAtMs: null,
        deletedBy: null,
        deletedByName: null
      }, { merge: true });
      await logAudit('transaction_restore', { id, user: trx.user, amount: Number(trx.amount || 0) });
      showToast('✓ Transaksi dipulihkan');
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {

      showToast('Gagal memulihkan transaksi', true);

  async function hardDeleteTransaction(id) {
    if (!isAdmin()) return showToast('Hanya admin!', true);

    const trx = cachedTransactions.find(t => t.id === id);

      await refreshCurrentPage();

      await refreshCurrentPage();

  async function updateHomeStatus() {
    const el = $('home-status'); if (!el) return;
    if (isAdmin()) {
      const userCount = cachedUsers.length || new Set(cachedTransactions.map(t => t.user)).size || 0;
      const activeToday = new Set(cachedAttendance.filter(a => extractDateKey(a) === toDateKey(nowDate())).map(a => sanitizeUsername(a.user))).size;
      el.innerHTML = `<div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--accent)"><i class="fas fa-shield-halved"></i> Panel admin aktif</div><div style="font-size:12px;color:var(--text-soft)">Total user: ${userCount} · aktif hari ini: ${activeToday}</div><div style="font-size:11px;color:var(--text-ghost)">Admin bisa transaksi langsung tanpa absen.</div></div>`;
      return;
    }
    if (!attendanceReady) {
      if (hasClockedInToday()) {
        const rec = getTodayAttendanceRecord();
        const jam = formatAttendanceTime(rec);
        el.innerHTML = `<div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--green)"><i class="fas fa-circle-check"></i> Status absen tersimpan</div><div style="font-size:12px;color:var(--text-soft)">Jam absen: ${jam} · memverifikasi ke server...</div></div>`;
      } else {
        el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-soft)"><i class="fas fa-circle-notch fa-spin"></i> Memuat status absen...</div>`;
      }
    } else if (hasClockedInToday()) {
      const rec = getTodayAttendanceRecord();
      const jam = formatAttendanceTime(rec);
      el.innerHTML = `<div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--green)"><i class="fas fa-circle-check"></i> Sudah absen hari ini</div><div style="font-size:12px;color:var(--text-soft)">Jam absen: ${jam}</div></div>`;
    } else {
      const dist = currentPos ? calculateDistance(currentPos.lat, currentPos.lng, OFFICE_LOC.lat, OFFICE_LOC.lng) : null;
      const disabled = !currentPos || (dist && dist > RADIUS_LIMIT);
      el.innerHTML = `<button onclick="handleClockIn()" ${disabled?'disabled':''} class="btn btn-primary" style="padding:12px 16px;width:auto;border-radius:12px"><i class="fas fa-fingerprint" style="font-size:13px"></i> Absen</button>`;
    }
  }


  async function updateHomeStats() {
    const today = toDateKey(nowDate());
    const month = toMonthKey(nowDate());
    const visibleTransactions = getVisibleTransactions();
    const visibleAttendance = getVisibleAttendance();
    const sourceTransactions = isAdmin() && selectedUserFilter !== 'all'
      ? visibleTransactions.filter(t => t.user === selectedUserFilter)
      : visibleTransactions;
    const sourceAttendance = isAdmin() && selectedUserFilter !== 'all'
      ? visibleAttendance.filter(a => a.user === selectedUserFilter)
      : visibleAttendance;
    const pendapatanHariIni = sourceTransactions.filter(t => extractDateKey(t) === today).reduce((a,b)=>a+Number(b.amount||0),0);
    const omzetBulanan = sourceTransactions.filter(t => t.monthKey === month).reduce((a,b)=>a+Number(b.amount||0),0);
    const bonus = calculateBonus(omzetBulanan);
    const rec = sortByCreatedDesc(sourceAttendance.filter(a => extractDateKey(a) === today))[0] || null;
    if ($('today-income')) $('today-income').innerText = `Rp ${formatRupiah(pendapatanHariIni)}`;
    if ($('total-bonus')) $('total-bonus').innerText = `Rp ${formatRupiah(bonus)}`;
    if ($('bonus-text')) $('bonus-text').innerText = `${month} · ${isAdmin() ? getSelectedUserLabel() : 'reset tiap bulan'}`;
    if ($('month-omzet')) $('month-omzet').innerText = `Rp ${formatRupiah(omzetBulanan)}`;
    if ($('today-attendance-info')) $('today-attendance-info').innerText = rec ? formatAttendanceTime(rec).slice(0,5) : '--:--';
    const card = $('today-attendance-card'), lbl = $('today-attendance-label'), info = $('today-attendance-info');
    if (card && lbl && info) {
      if (rec) {
        card.style.background = 'var(--green-dim)'; card.style.borderColor = 'rgba(82,216,158,0.2)';
        lbl.style.color = 'var(--green)'; info.style.color = 'var(--green)';
      } else {
        card.style.background = 'var(--red-dim)'; card.style.borderColor = 'rgba(255,107,107,0.2)';
        lbl.style.color = 'var(--red)'; info.style.color = 'var(--red)';
      }
    }
    if ($('scope-chip')) $('scope-chip').textContent = isAdmin() ? getSelectedUserLabel() : 'Data Saya';
    renderAdminDashboardPanels();
  }

  function getFilteredTransactions() {
    const visible = getVisibleTransactions();
    const source = isAdmin() && selectedUserFilter !== 'all' ? visible.filter(t => t.user === selectedUserFilter) : visible;
    const today = toDateKey(nowDate());
    const month = toMonthKey(nowDate());
    const year = getBusinessYear(nowDate());
    if (historyFilter === 'daily') return source.filter(t => getTransactionDateKey(t) === today);
    if (historyFilter === 'monthly') return source.filter(t => getTransactionMonthKey(t) === month);
    if (historyFilter === 'yearly') return source.filter(t => String(getTransactionDateKey(t) || '').startsWith(year));
    if (historyFilter === 'range' && rangeStartDate && rangeEndDate) return source.filter(t => { const dateKey = getTransactionDateKey(t); return dateKey >= rangeStartDate && dateKey <= rangeEndDate; });
    return source;
  }


  async function renderHistory() {
    const list = $('history-list'); if (!list) return;
    const filtered = sortByCreatedDesc(getFilteredTransactions());
    const total = filtered.reduce((a,b)=>a+Number(b.amount||0),0);
    const visibleItems = filtered.slice(0, historyDisplayLimit);
    const hasMore = filtered.length > visibleItems.length;
    const filterBox = isAdmin() ? `
      <div style="margin-bottom:10px" class="page-in s1">
        <select id="admin-history-user" class="g-input" onchange="setSelectedUserFilter(this.value)">${getUserOptionsHtml(true)}</select>
      </div>` : '';
    list.innerHTML = `

  function serializeTimestamp(value) {
    if (!value) return null;
    if (value.toDate) return value.toDate().toISOString();
    if (typeof value === 'string') return value;
    return null;
  }

  function getBackupPayload() {
    return {
      version: 'supabase-secure-v2',
      projectId: supabaseConfig.projectId,
      exportedAt: new Date().toISOString(),
      exportedBy: currentUser?.username || 'admin',
      data: {
        users: sortUsers(cachedUsers).map(u => ({
          username: u.username, name: u.name, pin: String(u.pin || ''), role: String(u.role || 'staff'),
          active: u.active !== false, createdAt: serializeTimestamp(u.createdAt) || null
        })),
        attendance: sortByCreatedDesc(getVisibleAttendance()).map(a => ({
          user: a.user, name: a.name, dateKey: a.dateKey || extractDateKey(a),
          lat: a.lat ?? a.loc?.lat ?? null, lng: a.lng ?? a.loc?.lng ?? null,
          createdAt: serializeTimestamp(a.createdAt) || null,
          createdAtMs: a.createdAt?.toDate ? a.createdAt.toDate().getTime() : (a.createdAtMs || Date.now())
        })),
        transactions: sortByCreatedDesc(getVisibleTransactions()).map(t => ({
          user: t.user, name: t.name, note: t.note || 'Transaksi', amount: Number(t.amount || 0),
          dateKey: t.dateKey || extractDateKey(t), monthKey: t.monthKey || toMonthKey(new Date()),
          createdAt: serializeTimestamp(t.createdAt) || null,
          createdAtMs: t.createdAt?.toDate ? t.createdAt.toDate().getTime() : (t.createdAtMs || Date.now())
        }))
      }
    };
  }

  function downloadTextFile(content, filename, mimeType = 'text/plain;charset=utf-8') {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function csvEscape(value) {
    const s = String(value ?? '');
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  function toCsv(rows, headers) {
    const lines = [headers.join(',')];
    for (const row of rows) lines.push(headers.map(h => csvEscape(row[h])).join(','));
    return lines.join('\n');
  }

  function parseCsv(text) {
    const rows = [];
    let row = [], value = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { value += '"'; i++; }
        else if (c === '"') inQuotes = false;
        else value += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(value); value = ''; }
        else if (c === '\n') { row.push(value); rows.push(row); row = []; value = ''; }
        else if (c === '\r') { }
        else value += c;
      }
    }
    if (value.length || row.length) { row.push(value); rows.push(row); }
    if (!rows.length) return [];
    const headers = rows[0].map(x => String(x || '').trim());
    return rows.slice(1).filter(r => r.some(cell => String(cell || '').trim() !== '')).map(r => {
      const obj = {};
      headers.forEach((h, idx) => obj[h] = r[idx] ?? '');
      return obj;
    });
  }

  function normalizeBackupShape(raw) {
    if (!raw) throw new Error('Backup kosong');
    if (raw.data && typeof raw.data === 'object') return raw;
    return {
      version: raw.version || 'legacy-import',
      exportedAt: raw.exportedAt || new Date().toISOString(),
      data: {
        users: Array.isArray(raw.users) ? raw.users : [],
        attendance: Array.isArray(raw.attendance) ? raw.attendance : [],
        transactions: Array.isArray(raw.transactions) ? raw.transactions : []
      }
    };
  }

  async function downloadBackup(format = 'json') {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    setLoading(true);
    try {
      const backup = getBackupPayload();
      const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
      if (format === 'json') {
        downloadTextFile(JSON.stringify(backup, null, 2), `rocky-backup-${stamp}.json`, 'application/json');
        showToast('✓ Backup JSON diunduh');
      } else if (format === 'xlsx') {
        if (!window.XLSX) throw new Error('Library Excel belum siap');
        const wb = XLSX.utils.book_new();
        const usersRows = backup.data.users.map(u => ({
          username: u.username || '',
          name: u.name || '',
          pin: u.pin || '',
          role: u.role || 'staff',
          createdAt: u.createdAt || ''
        }));
        const attendanceRows = backup.data.attendance.map(a => ({
          user: a.user || '',
          name: a.name || '',
          dateKey: a.dateKey || '',
          lat: a.lat ?? '',
          lng: a.lng ?? '',
          createdAt: a.createdAt || '',
          createdAtMs: a.createdAtMs || ''
        }));
        const transactionRows = backup.data.transactions.map(t => ({
          user: t.user || '',
          name: t.name || '',
          note: t.note || '',
          amount: Number(t.amount || 0),
          dateKey: t.dateKey || '',
          monthKey: t.monthKey || '',
          createdAt: t.createdAt || '',
          createdAtMs: t.createdAtMs || ''
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(usersRows), 'users');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attendanceRows), 'attendance');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(transactionRows), 'transactions');
        XLSX.writeFile(wb, `rocky-backup-${stamp}.xlsx`);
        showToast('✓ Backup Excel diunduh');
      }
    } catch (e) {
      console.error(e);
      showToast('Gagal backup', true);
    }
    setLoading(false);
  }

  async function importBackupData(backup) {
    const users = Array.isArray(backup.data.users) ? backup.data.users : [];
    const attendance = Array.isArray(backup.data.attendance) ? backup.data.attendance : [];
    const transactions = Array.isArray(backup.data.transactions) ? backup.data.transactions : [];
    for (const u of users) {
      const username = sanitizeUsername(u.username);
      if (!username) continue;
      await setDoc(doc(db, 'users', username), {
        username,
        name: String(u.name || username),
        pin: String(u.pin || ''),
        role: String(u.role || 'staff'),
        active: u.active !== false,
        createdAt: u.createdAt ? Timestamp.fromMillis(new Date(u.createdAt).getTime()) : serverTimestamp()
      }, { merge: true });
    }
    for (const a of attendance) {
      const ms = Number(a.createdAtMs || (a.createdAt ? new Date(a.createdAt).getTime() : Date.now()));
      await addDoc(collection(db, 'attendance'), {
        user: sanitizeUsername(a.user),
        name: String(a.name || a.user || ''),
        dateKey: String(a.dateKey || ''),
        lat: a.lat ?? null,
        lng: a.lng ?? null,
        createdAt: Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
    }
    for (const t of transactions) {
      const ms = Number(t.createdAtMs || (t.createdAt ? new Date(t.createdAt).getTime() : Date.now()));
      await addDoc(collection(db, 'transactions'), {
        user: sanitizeUsername(t.user),
        name: String(t.name || t.user || ''),
        note: String(t.note || 'Transaksi'),
        amount: Number(t.amount || 0),
        dateKey: String(t.dateKey || ''),
        monthKey: String(t.monthKey || ''),
        createdAt: Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
    }
    return { users, attendance, transactions };
  }

  function handleRestoreFileSelect(type) {
    const inputId = type === 'excel' ? 'restore-excel-file' : 'restore-file';
    const labelId = type === 'excel' ? 'restore-excel-label' : 'restore-json-label';
    const file = $(inputId)?.files?.[0] || null;
    if (type === 'excel') selectedRestoreExcelFile = file;
    else selectedRestoreJsonFile = file;
    const label = $(labelId);
    if (label) label.textContent = file ? `Dipilih: ${file.name}` : 'Belum ada file dipilih';
    if (file) showToast(`✓ File dipilih: ${file.name}`);
  }

  function getRestoreFile(type) {
    const inputId = type === 'excel' ? 'restore-excel-file' : 'restore-file';
    const cached = type === 'excel' ? selectedRestoreExcelFile : selectedRestoreJsonFile;
    return $(inputId)?.files?.[0] || cached || null;
  }

  function clearRestoreFile(type) {
    const inputId = type === 'excel' ? 'restore-excel-file' : 'restore-file';
    const labelId = type === 'excel' ? 'restore-excel-label' : 'restore-json-label';
    if ($(inputId)) $(inputId).value = '';
    if ($(labelId)) $(labelId).textContent = 'Belum ada file dipilih';
    if (type === 'excel') selectedRestoreExcelFile = null;
    else selectedRestoreJsonFile = null;
  }

  function pickLocalRestoreFile(type) {
    const accept = type === 'excel'
      ? '.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel'
      : '.json,application/json';
    return new Promise((resolve) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = accept;
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      input.style.opacity = '0';
      document.body.appendChild(input);
      input.addEventListener('change', () => {
        const file = input.files && input.files[0] ? input.files[0] : null;
        try { document.body.removeChild(input); } catch (e) {}
        resolve(file);
      }, { once: true });
      input.click();
    });
  }

  async function restoreBackupFromFile(fileOverride = null) {

  async function restoreExcelFromFile(fileOverride = null) {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const file = fileOverride || getRestoreFile('excel');
    if (!file) return showToast('Pilih file Excel dulu!', true);
    setLoading(true);
    try {
      if (!window.XLSX) throw new Error('Library Excel belum siap');
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });

      const pickSheetRows = (name) => {
        const sheet = workbook.Sheets[name];
        if (!sheet) return [];
        return XLSX.utils.sheet_to_json(sheet, { defval: '' });
      };

      const backup = {
        version: 'excel-import',
        exportedAt: new Date().toISOString(),
        data: {
          users: pickSheetRows('users').map(u => ({
            username: sanitizeUsername(u.username),
            name: String(u.name || ''),
            pin: String(u.pin || ''),
            role: String(u.role || 'staff'),
            active: String(u.active || 'true') !== 'false',
            createdAt: u.createdAt || null
          })).filter(u => u.username),
          attendance: pickSheetRows('attendance').map(a => ({
            user: sanitizeUsername(a.user),
            name: String(a.name || a.user || ''),
            dateKey: String(a.dateKey || ''),
            lat: a.lat === '' ? null : Number(a.lat),
            lng: a.lng === '' ? null : Number(a.lng),
            createdAt: a.createdAt || null,
            createdAtMs: Number(a.createdAtMs || 0)
          })).filter(a => a.user),
          transactions: pickSheetRows('transactions').map(t => ({
            user: sanitizeUsername(t.user),
            name: String(t.name || t.user || ''),
            note: String(t.note || 'Transaksi'),
            amount: Number(t.amount || 0),
            dateKey: String(t.dateKey || ''),
            monthKey: String(t.monthKey || ''),
            createdAt: t.createdAt || null,
            createdAtMs: Number(t.createdAtMs || 0)
          })).filter(t => t.user)
        }
      };

      const result = await importBackupData(backup);
      clearRestoreFile('excel');
      await logAudit('restore_data', { format: 'excel', users: result.users.length, attendance: result.attendance.length, transactions: result.transactions.length });
      showToast(`✓ Restore Excel selesai: ${result.users.length} user, ${result.attendance.length} absen, ${result.transactions.length} transaksi`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal restore Excel', true);
    }
    setLoading(false);
  }

  async function normalizeLegacyData() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    if (!confirm('Normalisasi data lama? Ini akan menambah field dateKey/monthKey/createdAtMs yang belum ada.')) return;
    setLoading(true);
    try {
      let updated = 0;
      const userSnap = await getDocs(collection(db, 'users'));
      for (const item of userSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        if (data.active === undefined) patch.active = true;
        if (data.username && data.username !== sanitizeUsername(data.username)) patch.username = sanitizeUsername(data.username);
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'users', item.id), patch, { merge: true });
          updated++;
        }
      }

      const attSnap = await getDocs(collection(db, 'attendance'));
      for (const item of attSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.user && data.username) patch.user = sanitizeUsername(data.username);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'attendance', item.id), patch, { merge: true });
          updated++;
        }
      }

      const trxSnap = await getDocs(collection(db, 'transactions'));
      for (const item of trxSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.monthKey && dk) patch.monthKey = dk.slice(0, 7);
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (data.deleted === undefined) patch.deleted = false;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'transactions', item.id), patch, { merge: true });
          updated++;
        }
      }

      await logAudit('normalize_legacy_data', { updated });
      showToast(`✓ Normalisasi selesai (${updated} update)`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal normalisasi data', true);
    }
    setLoading(false);
  }

                <h2 style="font-size:22px;font-weight:800;letter-spacing:-.02em">${isAdmin() ? 'Kontrol Semua Data' : 'Bismillah Dulu'}</h2>
              </div>
              <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">${themeIcon}</button>
                <button class="theme-toggle" onclick="logout()" title="Keluar"><i class="fas fa-right-from-bracket"></i></button>
              </div>
            </div>
            <div class="card page-in s1" style="padding:14px 16px;margin-bottom:12px">
              <p class="label-xs" style="margin-bottom:8px">${isAdmin() ? 'Ringkasan Hari Ini' : 'Absensi Hari Ini'}</p>
              <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
                <div id="home-status"></div>
                <div id="loc-info"><span class="loc-chip loc-loading"><i class="fas fa-circle-notch fa-spin" style="font-size:10px"></i> Mencari GPS...</span></div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px" class="page-in s2">
              <div class="card" style="padding:14px 15px">
                <p class="label-xs" style="margin-bottom:8px">${isAdmin() ? 'Omzet Hari Ini' : 'Pendapatan Hari Ini'}</p>
                <p id="today-income" style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--text)">Rp 0</p>
              </div>
              <div id="today-attendance-card" class="card" style="padding:14px 15px;background:var(--red-dim);border-color:rgba(255,107,107,0.2)">
                <p class="label-xs" id="today-attendance-label" style="margin-bottom:8px;color:var(--red)">${isAdmin() ? 'Aktivitas Hari Ini' : 'Absen Hari Ini'}</p>
                <p id="today-attendance-info" style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;color:var(--red);line-height:1">--:--</p>
              </div>
            </div>
            <div class="card page-in s3" style="padding:16px 16px;margin-bottom:10px"><div style="display:flex;justify-content:flex-end;margin-bottom:10px">${isAdmin() ? `<span id="scope-chip" class="user-chip">${getSelectedUserLabel()}</span>` : `<span id="scope-chip" class="user-chip">Data Saya</span>`}</div>
              <p class="label-xs" style="margin-bottom:8px">${isAdmin() ? 'Estimasi Bonus Global' : 'Bonus Bulan Ini'}</p>
              <p id="total-bonus" style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;color:var(--accent);margin-bottom:6px">Rp 0</p>
              <p id="bonus-text" style="font-size:11px;color:var(--text-soft)"></p>
              <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:11px;color:var(--text-soft)">Omzet bulan ini</span>
                <strong id="month-omzet" style="font-size:12px;color:var(--text)">Rp 0</strong>
              </div>
            </div>
            ${isAdmin() ? `<div id="admin-dashboard-panels"></div>` : ''}
          </div>`;
        updateLocation(); updateHomeStatus(); updateHomeStats();
      } else if (page === 'history') {
        nav.style.display = 'flex'; setActiveNav(page);
        content.innerHTML = `
          <div class="page-pad">
            <div style="padding:34px 0 18px;display:flex;justify-content:space-between;align-items:center" class="page-in">
              <div><p class="page-title">${isAdmin() ? 'Semua Transaksi' : 'Riwayat'}</p><p class="page-subtitle">${isAdmin() ? 'Pantau transaksi seluruh user' : 'Daftar transaksi yang sudah tersimpan'}</p></div>
              <div style="display:flex;gap:8px">
                <button class="theme-toggle" onclick="toggleTheme()">${themeIcon}</button>
                <button class="theme-toggle" onclick="logout()" title="Keluar"><i class="fas fa-right-from-bracket"></i></button>
              </div>
            </div>
            <div id="history-list" style="display:flex;flex-direction:column;gap:9px;padding-bottom:22px"></div>
          </div>`;
        renderHistory();
      } else if (page === 'report') {
        nav.style.display = 'flex'; setActiveNav(page);
        content.innerHTML = `
          <div class="page-pad">
            <div style="padding:34px 0 18px;display:flex;justify-content:space-between;align-items:center" class="page-in">
              <div><p class="page-title">${isAdmin() ? 'Laporan Global' : 'Laporan'}</p><p class="page-subtitle">${isAdmin() ? 'Ringkasan semua user dalam satu panel' : 'Omzet, hadir, bonus, dan ringkasan kerja'}</p></div>
              <div style="display:flex;gap:8px">
                <button class="theme-toggle" onclick="toggleTheme()">${themeIcon}</button>
                <button class="theme-toggle" onclick="logout()" title="Keluar"><i class="fas fa-right-from-bracket"></i></button>
              </div>
            </div>
            <div class="tab-group page-in" style="margin-bottom:14px">
              <button id="f-daily" onclick="setReportFilter('daily')" class="tab-btn ${reportFilter==='daily'?'active':''}">Harian</button>
              <button id="f-monthly" onclick="setReportFilter('monthly')" class="tab-btn ${reportFilter==='monthly'?'active':''}">Bulanan</button>
              <button id="f-yearly" onclick="setReportFilter('yearly')" class="tab-btn ${reportFilter==='yearly'?'active':''}">Tahunan</button>
            </div>
            <div id="report-view" style="display:flex;flex-direction:column;gap:10px;padding-bottom:18px"></div>
          </div>`;
        renderReport();
      } else if (page === 'settings') {
        nav.style.display = 'flex'; setActiveNav(page);
        content.innerHTML = `
          <div class="page-pad">
            <div style="padding:50px 0 18px;display:flex;justify-content:space-between;align-items:center" class="page-in">
              <p class="page-title">${isAdmin() ? 'User & Sistem' : 'Sistem'}</p>
              <div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">${themeIcon}</button></div>
            </div>
            <div style="text-align:center;margin-bottom:24px" class="page-in">
              <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg, var(--accent), #818cf8);display:flex;align-items:center;justify-content:center;font-size:28px;color:white;margin:0 auto">${escapeHtml((currentUser.name||'?').charAt(0).toUpperCase())}</div>
              <p style="font-size:17px;font-weight:700;margin-top:12px;letter-spacing:-0.01em">${escapeHtml(currentUser.name)}</p>
              <p style="font-size:12.5px;color:var(--text-soft);margin-top:2px">@${escapeHtml(currentUser.username)} · ${getRoleLabel()}</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:7px;padding-bottom:18px" class="page-in s1">
              <button onclick="toggleTheme()" class="setting-row">
                <div class="setting-ico" style="background:var(--amber-dim)"><i class="fas fa-circle-half-stroke" style="color:var(--amber)"></i></div>
                <span class="setting-label">Mode Tampilan</span>
                <span style="font-size:11px;font-weight:600;color:var(--text-soft);margin-right:8px;text-transform:capitalize">${getTheme() === 'dark' ? '🌙 Gelap' : '☀️ Terang'}</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              <button onclick="updateLocation();showToast('Refresh lokasi')" class="setting-row">
                <div class="setting-ico" style="background:var(--green-dim)"><i class="fas fa-location-dot" style="color:var(--green)"></i></div>
                <span class="setting-label">Refresh Lokasi</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              <button onclick="seedDemoUser()" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-user-plus" style="color:var(--accent)"></i></div>
                <span class="setting-label">Pastikan User Demo Aji</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              ${isAdmin() ? `<button onclick="setSelectedUserFilter('all')" class="setting-row">
                <div class="setting-ico" style="background:var(--accent-dim)"><i class="fas fa-users" style="color:var(--accent)"></i></div>
                <span class="setting-label">Reset Filter ke Semua User</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>` : ''}
              <button onclick="logout()" class="setting-row">
                <div class="setting-ico" style="background:var(--red-dim)"><i class="fas fa-right-from-bracket" style="color:var(--red)"></i></div>
                <span class="setting-label">Keluar Aplikasi</span>
                <i class="fas fa-chevron-right setting-arrow"></i>
              </button>
              <div class="card" style="padding:14px 16px;margin-top:8px">
                <p class="label-xs">Info Supabase</p>
                <div id="settings-summary"></div>
              </div>
            </div>
          </div>`;
        renderSettingsSummary();
      }
    }
  };

  function setHistoryFilter(f) { historyFilter = f; resetHistoryDisplayLimit(); renderHistory(); }
  function filterHistoryByDateRange() {
    const s = $('history-range-start')?.value, e = $('history-range-end')?.value;
    if (s && e) { rangeStartDate = s; rangeEndDate = e; historyFilter = 'range'; resetHistoryDisplayLimit(); renderHistory(); }
    else showToast('Pilih tanggal!', true);
  }
  function resetHistoryFilter() { rangeStartDate = null; rangeEndDate = null; historyFilter = 'daily'; resetHistoryDisplayLimit(); renderHistory(); }
  function setReportFilter(f) {
    reportFilter = f;
    ['daily','monthly','yearly'].forEach(tab => {
      const b = $('f-' + tab); if (b) b.classList.toggle('active', tab === f);
    });
    renderReport();
  }


  function setSelectedUserFilter(value) {
    selectedUserFilter = value || 'all';
    updateHomeStats();
    resetHistoryDisplayLimit();
    resetInactiveUserLimit();
    if (currentPage === 'history') renderHistory();
    if (currentPage === 'report') renderReport();
    if (currentPage === 'settings') renderSettingsSummary();
  }

  async function seedDemoUser() {
    setLoading(true);
    try { await seedDemoUserIfMissing(); showToast('✓ User demo siap: aji / 123456'); }
    catch (e) { showToast('Gagal buat user demo', true); }
    setLoading(false);
  }

  window.toggleTheme = toggleTheme;
  window.login = login;
  window.logout = logout;
  window.handleClockIn = handleClockIn;
  window.openTransactionModal = openTransactionModal;
  window.closeTransactionModal = closeTransactionModal;
  window.handleTransactionFromModal = handleTransactionFromModal;
  window.deleteTransaction = deleteTransaction;
  window.restoreDeletedTransaction = restoreDeletedTransaction;
  window.hardDeleteTransaction = hardDeleteTransaction;
  window.bulkRestoreDeletedTransactions = bulkRestoreDeletedTransactions;
  window.bulkHardDeleteDeletedTransactions = bulkHardDeleteDeletedTransactions;
  window.setRecycleSearch = setRecycleSearch;
  window.setRecycleUserFilter = setRecycleUserFilter;
  window.resetRecycleFilters = resetRecycleFilters;
  window.increaseRecycleBinLimit = increaseRecycleBinLimit;
  window.increaseHistoryDisplayLimit = increaseHistoryDisplayLimit;
  window.increaseInactiveUserLimit = increaseInactiveUserLimit;
  window.filterHistoryByDateRange = filterHistoryByDateRange;
  window.resetHistoryFilter = resetHistoryFilter;
  window.setHistoryFilter = setHistoryFilter;
  window.setReportFilter = setReportFilter;
  window.setSelectedUserFilter = setSelectedUserFilter;
  window.seedDemoUser = seedDemoUser;
  window.fillAdminUserForm = fillAdminUserForm;
  window.clearAdminUserForm = clearAdminUserForm;
  window.saveAdminUser = saveAdminUser;
  window.deleteAdminUser = deleteAdminUser;
  window.hardDeleteAdminUser = hardDeleteAdminUser;
  window.downloadBackup = downloadBackup;
  window.handleRestoreFileSelect = handleRestoreFileSelect;
  window.restoreBackupFromFile = restoreBackupFromFile;
  window.restoreExcelFromFile = restoreExcelFromFile;
  window.pickAndRestoreJsonFile = pickAndRestoreJsonFile;
  window.pickAndRestoreExcelFile = pickAndRestoreExcelFile;
  window.resetAllAppData = resetAllAppData;
  window.normalizeLegacyData = normalizeLegacyData;
  window.router = router;
  window.updateLocation = updateLocation;

  async function refreshTransactionsNow() {
    if (!currentUser) return;
    try {
      const qy = isAdmin()
        ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
        : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
      const snap = await getDocs(qy);
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      refreshCurrentPage();
    } catch (e) {
      console.error('refreshTransactionsNow gagal:', e);
    }
  }

  window.addEventListener('online', () => { renderSettingsSummary(); if (currentUser) bindRealtimeData(); });
  window.addEventListener('offline', () => renderSettingsSummary());
  let lastForegroundRefreshAt = 0;
  async function refreshForegroundData() {
    if (!currentUser) return;
    const now = Date.now();
    if (now - lastForegroundRefreshAt < 1500) return;
    lastForegroundRefreshAt = now;
    preloadAttendanceCache();
    refreshCurrentPage();
    await refreshTransactionsNow();
  }

  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden && currentUser) await refreshForegroundData();
  });
  window.addEventListener('focus', async () => {
    if (currentUser) await refreshForegroundData();
  });

  (async () => {
    if (await restoreSession()) router.navigate('home');
    else router.navigate('login');
  })();
</script>
</body>
</html>
